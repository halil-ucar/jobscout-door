:root{
  /* "Graphit" (user 2026-07-11): Tinte ist die einzige Interface-Farbe — Chroma traegt
     ausschliesslich Bedeutung (Fit-Ampel, Status, Warnungen). Reinweisse Karten auf
     tiefem Warmgrau mit Licht-von-oben-Verlauf, mehrschichtige Schatten, Haarlinien. */
  --ink:#191B1D; --ink-hover:#2F3235; --text2:#3A3D40; --meta:#6E7276;
  --mut1:#A1A3A2; --mut2:#ACAFAE; --mut3:#B6B6B4; --dim-title:#54585A; --dim-meta:#8A8E8C;
  --bg:#F2F2EE; --bg-hi:#FAFAF8; --card:#FFFFFF; --panel:#F4F4F0; --hover:#F0F0EB; --chipbg:#EAEAE4;
  --shadow:0 1px 1px rgba(20,21,19,.04),0 2px 6px rgba(20,21,19,.04),0 10px 28px rgba(20,21,19,.05);
  --shadow-h:0 1px 1px rgba(20,21,19,.05),0 4px 10px rgba(20,21,19,.06),0 16px 40px rgba(20,21,19,.09);
  --green:#16794C; --green2:#1F9256; --green-bg:#EAF5EE; --green-bg-h:#DBEEE2; --green-line:#CDE7D8;
  --violet:#6D45C0; --violet2:#8E6AD6;
  --amber:#9A6410; --amber-bg:#FBF2D6; --amber-line:#EBDCAC;
  --red:#B23A50; --red2:#C06078; --red-bg:#FAEDEF; --red-line:#F0CDD6;
  --b05:rgba(12,12,10,.05); --b055:rgba(12,12,10,.055); --b07:rgba(12,12,10,.07);
  --b08:rgba(12,12,10,.08); --b09:rgba(12,12,10,.09); --b10:rgba(12,12,10,.1);
  --b12:rgba(12,12,10,.12); --b14:rgba(12,12,10,.14); --b18:rgba(12,12,10,.18);
  --sans:'Hanken Grotesk',system-ui,-apple-system,sans-serif;
  --disp:'Space Grotesk',var(--sans);
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;background:var(--bg)}
body{background:var(--bg);background:linear-gradient(180deg,var(--bg-hi) 0,var(--bg) 340px);
  color:var(--ink);font-family:var(--sans);font-size:14px;
  line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button{appearance:none;-webkit-appearance:none;border:none;background:none;font:inherit;
  color:inherit;cursor:pointer;padding:0;text-align:inherit}
button:focus-visible,a:focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:4px}
a{color:inherit;text-decoration:none}
.app{max-width:1180px;margin:0 auto;min-height:100vh}

/* ---------- topbar ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:13px 20px;border-bottom:1px solid var(--b08);
  position:sticky;top:0;z-index:20;background:rgba(250,250,248,.85);
  -webkit-backdrop-filter:blur(16px) saturate(1.6);backdrop-filter:blur(16px) saturate(1.6)}
.topbar-left{display:flex;align-items:center;gap:18px;min-width:0}
.brand{display:flex;align-items:center;gap:10px;flex:none}
.brand-mark{width:28px;height:28px;border-radius:9px;background:var(--ink);
  display:grid;place-items:center;flex:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 1px 2px rgba(20,21,19,.2)}
.brand-name{font:650 16.5px var(--disp);letter-spacing:-.025em;white-space:nowrap}
.nav{display:flex;align-items:center;gap:9px;overflow:visible}
.nav::-webkit-scrollbar{display:none}
.tab{position:relative;padding:7px 13px;font-size:14px;font-weight:560;color:var(--text2);
  border-radius:999px;white-space:nowrap;transition:background .12s ease,color .12s ease}
.tab:hover{background:var(--hover)}
.tab .cnt{color:var(--mut1);font-family:var(--mono);font-size:11px;font-weight:500;
  vertical-align:1px;margin-left:1px}
.tab.on{background:var(--ink);color:#fff}
.tab.on .cnt{color:rgba(255,255,255,.72)}
.tab.on:hover{background:var(--ink)}
.livepill{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:560;
  color:var(--green);flex:none;white-space:nowrap}
.livepill .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.livepill.snapshot{color:var(--amber)}
.livepill.snapshot .dot{background:var(--amber)}
.livepill time{font-family:var(--mono);font-weight:500}

/* ---------- overview ---------- */
.view{padding:16px 20px 26px}
.view.vin{animation:vin .22s cubic-bezier(.2,.7,.3,1)}
@keyframes vin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.kpis{display:flex;align-items:flex-end;gap:30px;padding:8px 2px 18px;border-bottom:1px solid var(--b07);flex-wrap:wrap}
.kpi .num{font:600 29px var(--mono);line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.kpi .lbl{font-size:10.5px;font-weight:650;letter-spacing:.08em;text-transform:uppercase;color:var(--mut1);margin-top:7px}
.kpi.g .num{color:var(--green)} .kpi.v .num{color:var(--violet)}
.kpis .spacer{flex:1}
.kpi-mini{text-align:right;transition:opacity .12s ease}
.kpi-mini:hover{opacity:.7}
.kpi-mini .num{font:600 17.5px var(--mono);color:var(--mut1);line-height:1;font-variant-numeric:tabular-nums}
.kpi-mini .lbl{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--mut2);margin-top:6px}

/* ---------- Start-Hero (user 2026-07-11): drei grosse Kennzahlen auf dem Grund ---------- */
.kick{font-size:10.5px;font-weight:650;letter-spacing:.09em;text-transform:uppercase;
  color:var(--mut2);margin:16px 0 0}
.kick b{color:var(--mut1);font-weight:650;font-family:var(--mono);letter-spacing:.02em}
.hero{display:flex;align-items:stretch;margin:12px 0 6px;flex-wrap:wrap;row-gap:14px}
.hstat{padding:2px 30px 4px 0;text-align:left;background:none;border:0;border-radius:12px}
.hstat+.hstat{border-left:1px solid var(--b09);padding-left:30px}
.hstat .num{font:600 42px var(--mono);letter-spacing:-.045em;line-height:1;font-variant-numeric:tabular-nums}
.hstat .lbl{font-size:10.5px;font-weight:650;letter-spacing:.09em;text-transform:uppercase;color:var(--mut1);margin-top:9px;white-space:nowrap}
.hstat.g .num{color:var(--green)}
.hstat.v .num{color:var(--violet)}
.hstat.link{cursor:pointer;transition:opacity .15s ease}
.hstat.link:hover{opacity:.68}
.hstat.link .lbl{border-bottom:1px solid var(--b18);display:inline-block;padding-bottom:1px}
/* Mini-Balkengraph "Neue Funde je Lauf" (user 2026-07-11) */
.hstat.chart{display:flex;flex-direction:column;justify-content:flex-end}
.hchart{display:block}
.hchart rect{fill:#DBDCD6}
.hchart rect.base{fill:var(--b08)}
.hchart rect.last{fill:var(--ink)}

/* ---------- Listen-Karte: die Trefferliste als EINE weisse Tabellen-Karte ---------- */
.listcard{background:var(--card);border:1px solid var(--b07);border-radius:20px;
  box-shadow:var(--shadow);overflow:hidden;margin-top:14px}
.listcard>div+div{border-top:1px solid var(--b055)}
.listcard .row{border-top:0;border-radius:0;padding:14px 18px}
.listcard .deepwrap{padding:0 18px 16px}

/* ---- Lauf-Journal (user GO 2026-07-11): Ergebnisse je Lauf als Zeitstrahl ---- */
.jr{position:relative;padding:0 18px 0 42px}
.jr::before{content:"";position:absolute;left:23px;top:0;bottom:0;width:1px;background:var(--b08)}
.jr:first-child::before{top:21px}
.jr:last-child::before{bottom:auto;height:21px}
.jr:first-child:last-child::before{display:none}
.jdot{position:absolute;left:19px;top:17px;width:9px;height:9px;border-radius:50%;
  background:var(--ink);box-shadow:0 0 0 2.5px var(--card)}
.jdot.empty{background:var(--card);border:1.5px solid var(--b18);box-sizing:border-box}
.jhead{display:flex;align-items:center;gap:7px;width:100%;padding:12px 0;flex-wrap:wrap;
  row-gap:5px;text-align:left;cursor:default}
.jhead.tap{cursor:pointer}
.jday{font-size:13.5px;font-weight:650;letter-spacing:-.01em;color:var(--ink);white-space:nowrap}
.jday .rs{color:var(--mut2);font-weight:500}
.jchip{font:600 11px var(--mono);border-radius:999px;padding:2.5px 9px;white-space:nowrap;
  color:var(--meta);background:var(--chipbg)}
.jchip.g{color:var(--green);background:var(--green-bg)}
.jchip.v{color:var(--violet);background:#F0EBFA}
.jnix{font-size:12.5px;color:var(--mut2)}
.jhead .tgl{margin-left:auto;font-size:11.5px;color:var(--mut2);white-space:nowrap}
.jitems{padding:0 0 11px}
.jitem{display:flex;align-items:center;gap:10px;padding:6.5px 0}
.jitem+.jitem{border-top:1px solid var(--b05)}
.jfit{flex:none;font:600 12px var(--mono);width:36px;text-align:center;padding:3px 0;
  border-radius:999px;border:1px solid transparent;font-variant-numeric:tabular-nums}
.jfit.fitc-h{background:var(--green-bg);border-color:var(--green-line)}
.jfit.fitc-m{background:var(--amber-bg);border-color:var(--amber-line)}
.jfit.fitc-l{background:var(--red-bg);border-color:var(--red-line)}
.jmain{flex:1;min-width:0;display:block;text-decoration:none;color:inherit}
.jmain .t{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jmain .s{font-size:11.5px;color:var(--mut1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jtag{flex:none;font-size:10.5px;font-weight:700;letter-spacing:.03em;border-radius:999px;padding:2.5px 8px;white-space:nowrap}
.jtag.g{color:var(--green);background:var(--green-bg)}
.jtag.v{color:var(--violet);background:#F0EBFA}
.jtag.n{color:var(--meta);background:var(--chipbg)}
/* Kicker = tippbarer Kurzbericht des letzten Laufs (springt zum Journal) */
.kick.link{cursor:pointer;transition:color .12s ease}
.kick.link:hover{color:var(--mut1)}

.rungroup{margin-top:20px}
.runhead{display:flex;align-items:center;gap:10px;padding:2px 2px 4px;flex-wrap:wrap}
.runhead .rdate{font:600 15px var(--disp);letter-spacing:-.01em}
.runhead .rid{font-size:12px;color:var(--mut1);font-family:var(--mono)}
.runhead .rlabel{font-size:13px;color:var(--meta);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge-latest{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--ink);background:var(--chipbg);border-radius:20px;padding:2px 8px;flex:none}
.runhead .spacer{flex:1}
.arclink{font-size:11.5px;color:var(--mut2);white-space:nowrap;transition:color .12s ease}
.arclink:hover{color:var(--meta)}

.row{display:flex;align-items:center;gap:13px;padding:13px 6px;border-top:1px solid var(--b055);border-radius:10px;transition:background .12s ease}
.row:hover{background:var(--hover)}
.dot6{width:6px;height:6px;border-radius:50%;flex:none}
.dot6.t{background:var(--green2)} .dot6.u{background:var(--violet2)}
.dot6.o{background:var(--red2)} .dot6.x{background:var(--mut2)}
.rmain{flex:1;min-width:0}
.rtitle-line{display:flex;align-items:center;gap:8px;min-width:0;flex-wrap:wrap;row-gap:3px}
.rtitle{font-size:15px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;min-width:0}
.markchip{flex:none;font-size:11px;font-weight:600;color:var(--ink);background:var(--chipbg);
  border-radius:999px;padding:2px 8px;white-space:nowrap}
/* "Bewertung von Sonnet" — rough Kurzcheck score, visibly distinct from Opus deep-checks */
.sonnetchip{color:#7a5d00;background:#fdf3d7;border:1px solid #ecd9a0}
/* 🏦 Bank-(Mit-)Eigentümer — deutlicher Vermerk (user GO 2026-07-09), nie ein Ausschluss */
.bankchip{color:#8a1f1f;background:#fdeaea;border:1px solid #eebcbc}
.sonnetnote{font-size:10px;font-weight:600;color:#7a5d00;background:#fdf3d7;border:1px solid #ecd9a0;
  border-radius:5px;padding:1px 5px;margin-top:4px;white-space:nowrap}
/* V9 "Grund"-badges (Prüfliste): why an unverified entry is (noch) kein Treffer */
.whyrow{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 2px}
.whychip{font-size:10.5px;font-weight:600;color:var(--meta);background:var(--chipbg);
  border:1px solid var(--b14);border-radius:999px;padding:2px 8px;white-space:nowrap}
.whychip.floor{color:#7a5d00;background:#fdf3d7;border-color:#ecd9a0}
.whychip.host{color:#8a4b08;background:#fdeee0;border-color:#eccfa8;font-family:var(--mono)}
.whychip.sweep{color:#1f5aa8;background:#e8f1fd;border-color:#bcd6f5}
/* Kombi-Overrides: .whychip steht später im Stylesheet und würde die Farben sonst grau schlagen */
.whychip.sonnetchip{color:#7a5d00;background:#fdf3d7;border-color:#ecd9a0}
.whychip.bankchip{color:#8a1f1f;background:#fdeaea;border-color:#eebcbc}
/* Chip-Zeile der Prüfen-Karten: unter dem Titel eingerückt (Pille-Breite 44 + Lücke 14) */
.pcard .whyrow{margin:9px 0 2px 58px}
/* Automatik-Gesundheit: NUR im Fehlerfall sichtbar (user GO 2026-07-11) — eine Klartext-
   Warnkarte statt Dauer-Chip; bei Sollwert 0/0 existiert das Element gar nicht. */
.pshwarn{font-size:12.5px;line-height:1.55;color:#7a3b00;background:#fdeee0;
  border:1px solid #eccfa8;border-radius:12px;padding:11px 14px;margin:18px 0 0;max-width:78ch}
.pshwarn b{font-weight:700}
.pshwarn .sub{display:block;margin-top:4px;font-size:12px;color:#9a6a3a}
/* "Anonym" badge (Archiv): assessed posting without a company name — auto-archived */
.anonchip{flex:none;font-size:10.5px;font-weight:700;letter-spacing:.03em;color:#7a1f6e;
  background:#fbe9f8;border:1px solid #e8bfe2;border-radius:999px;padding:2px 8px;white-space:nowrap}
/* Bewerbungslog-Abgleich badge (user GO 2026-07-10): role match = green, firm-only = muted */
.logchip{color:#1f7a4d!important;background:#e8f5ee!important;border:1px solid #bfe3cf!important}
.logchip.soft{color:#5c6a75!important;background:#eef2f5!important;border:1px solid #d3dce2!important}
/* Initiativ-Kandidaten (Archiv, user GO 2026-07-10): per-company reason line under the row.
   Seit 2026-07-11 als ruhiger Zitat-Block (Panel + Regel) statt Bernstein — es ist ein Tipp,
   keine Warnung. */
.initwhy{margin:-2px 0 12px 26px;font-size:12.5px;line-height:1.55;color:var(--text2);
  background:var(--panel);border:0;border-left:2px solid var(--b14);
  border-radius:0 10px 10px 0;padding:8px 12px;max-width:78ch}
.floorhead .dot7{flex:none}
/* Section heads (Prüfliste 3-Bereiche; reuses the old V1(a) floorhead styling) */
.floorhead{display:flex;align-items:center;gap:10px;width:100%;margin:20px 0 8px;padding:9px 4px 8px;
  border:0;border-bottom:1px solid var(--b08);background:transparent;cursor:pointer;text-align:left}
.floorhead .l{font-size:11.5px;font-weight:700;letter-spacing:.08em;color:var(--meta);text-transform:uppercase}
.floorhead .c{font:600 11.5px var(--mono);color:var(--meta);background:var(--chipbg);
  border-radius:999px;padding:1px 8px}
.floorhead .tgl{margin-left:auto;font-size:11.5px;color:var(--mut2)}
/* V5 Allowlist governance box (Archiv) + Übersicht attention banner */
.alwpill{display:flex;align-items:center;gap:8px;width:100%;margin:0 0 12px;padding:7px 12px;
  border:1px solid var(--b14);border-radius:8px;background:var(--chipbg);cursor:pointer;text-align:left;
  font-size:12.5px;font-weight:600;color:var(--meta)}
.alwpill.amber{color:#7a5d00;background:#fdf3d7;border-color:#ecd9a0}
.alwpill .tgl{margin-left:auto;font-weight:400;color:var(--mut2)}
.alwpanel{border:1px solid var(--b14);border-radius:8px;padding:10px 12px;margin:-6px 0 12px}
.alwpanel .alwsec{font-size:12.5px;color:var(--meta);margin:8px 0 4px}
.alwpanel .alwsec.dim{color:var(--mut3)}
.alwbox .alwsec{font-size:12.5px;font-weight:600;color:var(--meta);margin:16px 0 4px;max-width:70ch}
.alwbox .alwsec.dim{color:var(--mut1);font-weight:500}
.alwbox .alwsec .c{font:600 11px var(--mono);color:var(--meta);background:var(--chipbg);
  border-radius:999px;padding:1px 7px}
/* Ruhezustand der Allowlist-Box: ein Satz statt Chip-Wolken (user GO 2026-07-11) */
.alwok{font-size:13px;line-height:1.55;color:var(--mut1);margin:2px 0 4px}
.alwok b{color:var(--text2)}
.alwwarn{font-size:12.5px;font-weight:500;color:#7a5d00;background:var(--amber-bg);
  border:1px solid var(--amber-line);border-radius:12px;padding:10px 13px;margin:10px 0 14px;line-height:1.5}
.alwwarn b{font-weight:700}
.alwwarn .hostwrap{margin:8px 0 0}
.alwwarn .hostchip{background:rgba(255,255,255,.55);border-color:var(--amber-line);color:#7a5d00}
.alwta{width:100%;box-sizing:border-box;font:11.5px/1.6 var(--mono);color:var(--text2);background:var(--panel);
  border:1px solid var(--b09);border-radius:10px;padding:10px 12px;margin:4px 0 8px;resize:vertical}
/* Host-Kategorien als Chips statt Komma-Prosa (user 2026-07-11) */
.hostwrap{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 2px}
.hostchip{font:500 11px var(--mono);color:var(--text2);background:var(--card);
  border:1px solid var(--b12);border-radius:7px;padding:2.5px 8px;white-space:nowrap}
.hostwrap.dim .hostchip{color:var(--mut1);background:transparent;border-color:var(--b08)}
/* (.alwq entfernt 2026-07-11: UNKLAR gilt als abgelehnt — es gibt keine Frage-Karte mehr) */
.alwfold{margin-top:16px}
.alwfold summary{cursor:pointer;font-size:12.5px;font-weight:600;color:var(--meta);
  padding:9px 0 8px;border-top:1px solid var(--b07);list-style:none;display:flex;gap:10px}
.alwfold summary::-webkit-details-marker{display:none}
.alwfold summary .c{font:600 11px var(--mono);color:var(--meta);background:var(--chipbg);
  border-radius:999px;padding:1px 7px}
.alwfold summary::after{content:"anzeigen";margin-left:auto;font-weight:400;color:var(--mut2)}
.alwfold[open] summary::after{content:"einklappen"}
.alwfold summary:hover,.alwfold[open] summary{color:var(--ink)}
.rmeta{font-size:12.5px;color:var(--meta);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rfit{flex:none;text-align:center;width:46px}
.rfit .n{font:600 13.5px var(--mono);line-height:1;display:inline-block;
  padding:5px 0;width:44px;border-radius:999px;font-variant-numeric:tabular-nums;
  border:1px solid transparent}
.rfit .n.fitc-h{background:var(--green-bg);border-color:var(--green-line)}
.rfit .n.fitc-m{background:var(--amber-bg);border-color:var(--amber-line)}
.rfit .n.fitc-l{background:var(--red-bg);border-color:var(--red-line)}
.rfit .l{display:none}
.racts{flex:none;display:flex;align-items:center;gap:5px}
.btn-p{font-size:13px;font-weight:600;color:#fff;background:var(--ink);border-radius:999px;
  padding:6px 14px;transition:background .15s ease,transform .06s ease;white-space:nowrap;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 1px 2px rgba(20,21,19,.18)}
.btn-p:hover{background:var(--ink-hover)}
.btn-p:active{transform:translateY(1px)}
.btn-o{font-size:12.5px;font-weight:550;color:var(--text2);background:var(--card);
  border:1px solid var(--b14);border-radius:999px;padding:5px 11px;transition:border-color .12s ease,color .12s ease;white-space:nowrap}
.btn-o:hover{border-color:var(--ink)}
.btn-o.danger:hover{border-color:var(--red);color:var(--red)}
.btn-g{font-size:12px;font-weight:550;color:var(--meta);padding:5px 8px;border-radius:8px;
  transition:color .12s ease,background .12s ease;white-space:nowrap}
.btn-g:hover{color:var(--ink);background:var(--hover)}
.btn-g.danger:hover{color:var(--red);background:var(--red-bg)}

.subhead{display:flex;align-items:center;gap:7px;margin-top:12px;padding:2px}
/* Prüflisten-Einteilung auch in der Übersicht (user 2026-07-09): kompakte Bereichszeilen */
.subhead.sec{margin-top:8px;padding-left:12px}
.subhead.sec .l{text-transform:none;letter-spacing:.02em;font-size:11.5px}
.dot6h{width:6px;height:6px;border-radius:50%;background:var(--violet);flex:none}
.subhead .l{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--violet)}
.subhead .c{font-size:11.5px;color:var(--mut2);font-family:var(--mono)}

.deepwrap{padding:2px 2px 12px 19px}
.deep{background:var(--panel);border:1px solid var(--b07);border-radius:12px;padding:12px 14px}
.deep-h{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--meta);margin-bottom:7px}
.deep-h b{color:var(--ink);font-weight:700}
.dl{display:flex;gap:8px;font-size:13px;color:var(--text2);line-height:1.55;padding:2px 0}
.dl .dash{color:var(--mut3);flex:none}
.dl b{font-weight:650;color:var(--ink)}
.deep-open{display:inline-block;margin-top:8px;font-size:12.5px;font-weight:600;color:var(--ink);
  border-bottom:1px solid rgba(10,10,10,.2)}
/* Zweitstufe der Details (user GO 2026-07-11): Recherche-Belege hinter einem Text-Aufklapper */
.dfold{margin:6px 0 2px}
.dfold summary{cursor:pointer;font-size:12px;font-weight:600;color:var(--meta);
  padding:7px 0 6px;border-top:1px solid var(--b07);list-style:none;display:flex;align-items:center;gap:8px}
.dfold summary::-webkit-details-marker{display:none}
.dfold summary .c{font:600 10.5px var(--mono);color:var(--meta);background:var(--chipbg);
  border-radius:999px;padding:1px 7px}
.dfold summary::after{content:"anzeigen";margin-left:auto;font-weight:400;color:var(--mut2)}
.dfold[open] summary::after{content:"einklappen"}
.dfold summary:hover,.dfold[open] summary{color:var(--ink)}

.emptybox{font-size:13.5px;line-height:1.6;color:var(--mut1);border:1px dashed var(--b12);
  border-radius:16px;padding:26px 18px;text-align:center;background:transparent}

/* ---------- merkliste ---------- */
.pagehead{font:650 26px var(--disp);letter-spacing:-.032em;text-wrap:balance;margin-top:10px}
.pagesub{font-size:13px;color:var(--meta);margin:4px 0 18px;max-width:64ch}
.merkgrid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.colhead{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.dot7{width:7px;height:7px;border-radius:50%;flex:none}
.colhead .l{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.colhead .c{font-size:12px;color:var(--mut2);font-family:var(--mono)}
.mcard{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--b07);
  border-radius:14px;margin-bottom:8px;background:var(--card);box-shadow:var(--shadow)}
.mcard .m{flex:1;min-width:0}
.mcard .t{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mcard .s{font-size:12px;color:var(--meta);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mcard .f{font:600 15.5px var(--mono);flex:none}
.btn-applied{font-size:11.5px;font-weight:600;color:var(--green2);background:var(--green-bg);
  border-radius:7px;padding:5px 9px;white-space:nowrap;transition:background .12s ease;flex:none}
.btn-applied:hover{background:var(--green-bg-h)}
.btn-letter{font-size:11.5px;font-weight:600;color:var(--ink);background:transparent;
  border:1px solid var(--b18);border-radius:8px;padding:5px 9px;cursor:pointer;flex:none;white-space:nowrap}
.btn-letter:hover{background:var(--panel)}
.btn-letter.on{color:var(--ink);border-color:var(--ink)}
/* Bewerbungen tab (Anschreiben-Studio surface) */
.stq-head{font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--meta);margin:24px 0 10px;display:flex;align-items:center;gap:8px}
.stq-head .c{font:600 11.5px var(--mono);color:var(--meta);background:var(--chipbg);
  border-radius:999px;padding:1px 8px;letter-spacing:0}
.stq-row{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--b07);border-radius:14px;margin-bottom:8px;background:var(--card);box-shadow:var(--shadow)}
.stq-row .m{flex:1;min-width:0}.stq-row .t{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stq-row .s{font-size:12px;color:var(--meta);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stq-num{flex:none;font:600 12.5px var(--mono);color:var(--meta);background:var(--panel);border-radius:7px;min-width:26px;text-align:center;padding:4px 0}
.stq-fit{flex:none;font:600 15.5px var(--mono)}
.stchip{flex:none;font-size:11px;font-weight:600;border-radius:7px;padding:3px 8px;background:var(--panel);color:var(--meta);white-space:nowrap}
.stchip.req{background:var(--green-bg);color:var(--green2)}
.stnotice{margin:10px 0;padding:10px 13px;border-radius:9px;background:var(--green-bg);border:1px solid var(--b18);font-size:13px}
.stposting{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--b18);border-radius:10px;background:var(--panel);margin-bottom:6px}
.stposting .m{flex:1;min-width:0}.stposting .t{font-size:15px;font-weight:600}.stposting .s{font-size:12.5px;color:var(--meta)}
.stpart{border:1px solid var(--b09);border-radius:10px;margin-bottom:10px;overflow:hidden}
.stpart-h{display:flex;align-items:center;gap:9px;padding:8px 12px;background:var(--panel);font-weight:600;font-size:13.5px}
.stpart-num{font:600 12px var(--mono);color:var(--meta);background:var(--b09);border-radius:6px;padding:2px 7px}
.stopt{display:flex;gap:9px;align-items:baseline;padding:7px 12px;font-size:13.5px;border-top:1px solid var(--b09)}
.stopt.rec{background:var(--green-bg)}
.stopt.sel{outline:2px solid var(--ink);outline-offset:-2px}
.stopt-code{flex:none;font:700 11.5px var(--mono);color:var(--meta);min-width:16px}
.stwhy{padding:7px 12px;font-size:12.5px;color:var(--meta);border-top:1px solid var(--b09)}
.stletter-meta{display:flex;gap:8px;margin-bottom:8px}
.stpill{font-size:11.5px;font-weight:600;border-radius:7px;padding:4px 9px;background:var(--panel);color:var(--meta)}
.stpill.ok{background:var(--green-bg);color:var(--green2)}
.stpill.fail{background:var(--panel);color:var(--amber)}
.stletter{border:1px solid var(--b18);border-radius:10px;padding:20px 24px;font-size:13.5px;margin-bottom:10px}
.stletter .subj{font-weight:700;margin:8px 0}
.stletter p{margin:7px 0;text-align:justify}
.stletter .date{text-align:right;color:var(--meta)}
.sthist{font-size:12.5px;color:var(--meta);padding:5px 0;border-bottom:1px solid var(--b09)}
.stq-cmds{margin-top:16px;padding:10px 13px;border:1px dashed var(--b18);border-radius:9px;font-size:12.5px;color:var(--meta)}
.stq-cmds code{font:600 12px var(--mono);color:var(--ink);background:var(--panel);border-radius:5px;padding:1px 5px}
/* studio live channel (buttons -> session) */
.stbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0 14px;padding:9px 12px;
  border:1px solid var(--b18);border-radius:10px;background:var(--panel);font-size:12.5px}
.stbar .mode{font-weight:700;white-space:nowrap}
.stbar .hint{color:var(--meta)}
.stbtn{font-size:12px;font-weight:600;color:var(--ink);background:transparent;border:1px solid var(--b18);
  border-radius:8px;padding:6px 11px;cursor:pointer;white-space:nowrap;flex:none;font-family:inherit}
.stbtn:hover{background:var(--hover)}
.stbtn.primary{color:var(--ink);border-color:var(--ink)}
.stbtn.warn{color:var(--amber);border-color:var(--amber)}
.stbtn:disabled{opacity:.4;cursor:default}
.stpart-h .stregen{margin-left:auto;padding:3px 8px;font-size:11px}
.stopt.click{cursor:pointer}
.stopt.click:hover{background:var(--hover)}
.stfeed{width:100%;min-height:64px;margin:4px 0 2px;padding:9px 11px;border:1px solid var(--b18);
  border-radius:9px;background:transparent;color:var(--ink);font-family:inherit;font-size:13px;resize:vertical}
.stactions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 4px}
.stbusy{display:inline-flex;align-items:center;gap:7px;color:var(--amber);font-weight:600;white-space:nowrap}
.stbusy::before{content:"";width:9px;height:9px;border-radius:50%;border:2px solid var(--amber);
  border-top-color:transparent;animation:stspin .8s linear infinite}
@keyframes stspin{to{transform:rotate(360deg)}}
.btn-x{width:24px;height:24px;border-radius:6px;color:var(--mut1);font-size:14px;flex:none;
  display:grid;place-items:center;transition:background .12s ease,color .12s ease}
.btn-x:hover{background:var(--hover);color:var(--ink)}
.beworben-sec{margin-top:18px;padding-top:16px;border-top:1px solid var(--b07)}
.beworben-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mcard.done{background:var(--panel)}
.srvchip{flex:none;font-size:10.5px;font-weight:600;color:var(--meta);background:var(--chipbg);
  border-radius:999px;padding:2px 8px;white-space:nowrap}

/* ---------- Bewerbungsstatus (applog whitelist extract) ---------- */
.aps-stats{display:flex;gap:26px;flex-wrap:wrap;margin:8px 0 14px}
.aps-stat .num{font:600 21px var(--mono);color:var(--ink);line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.aps-stat .lbl{font-size:10.5px;font-weight:650;letter-spacing:.07em;text-transform:uppercase;color:var(--mut1);margin-top:6px}
.aps-stat.warn .num{color:var(--amber)}
.aps-stat.ok .num{color:var(--green)}
.aps-stat.ges .num{color:var(--violet)}
.aps-stat.dim .num{color:var(--mut1)}
.aps-legend{font-size:11.5px;color:var(--mut2);margin:2px 0 6px}
.aps-row{display:flex;align-items:center;gap:10px;padding:8px 2px;border-top:1px solid var(--b05)}
.aps-card{margin-top:2px}
.aps-card .aps-row{padding:11px 16px;border-top:1px solid var(--b055)}
.aps-card>.aps-row:first-child{border-top:0}
.aps-card .aps-chip{background:var(--panel)}
/* Kennzahlen-Zeile (user 2026-07-11 #2): Editorial-Statistik statt Farbblock */
.aps-row .m{flex:0 0 32%;min-width:0}
.aps-row .t{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aps-row .s{font-size:11.5px;color:var(--meta);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aps-row.done .t{color:var(--dim-title);font-weight:500}
.aps-row.done .s{color:var(--dim-meta)}
.aps-track{flex:1;position:relative;height:14px;min-width:56px}
.aps-track::before{content:"";position:absolute;left:0;right:0;top:6px;height:2px;border-radius:1px;background:var(--b055)}
.aps-track.off::before{background:var(--b05)}
/* Heute-Linie: sitzt auf jeder Spur an derselben Stelle und ragt in die Zeilen-Polster —
   ueber die Zeilen hinweg ergibt das EINE durchlaufende Senkrechte. */
.aps-track::after{content:"";position:absolute;right:0;top:-11px;bottom:-11px;width:1.5px;background:var(--b14)}
.aps-track .tick{position:absolute;top:1px;bottom:1px;width:1px;background:var(--b14)}
.aps-bar{position:absolute;top:4px;height:6px;border-radius:3px 0 0 3px;background:#BCBFBC}
.aps-bar.warn{background:var(--amber)}
.aps-bar.ges{background:var(--violet)}
/* Monatslinien + Beschriftung der Datumsachse */
.gtick{position:absolute;top:-11px;bottom:-11px;width:1px;background:var(--b055)}
.glabel{position:absolute;top:1px;font-size:9.5px;font-weight:650;letter-spacing:.07em;
  text-transform:uppercase;color:var(--mut2);transform:translateX(4px);white-space:nowrap}
.glabel.today{right:-2px;left:auto;transform:none;color:var(--ink)}
.gdot{position:absolute;top:3px;width:8px;height:8px;border-radius:50%;background:var(--mut3);
  transform:translateX(-50%);box-shadow:0 0 0 2px var(--card)}
.gdot.ab{background:#CE9AA8}
.gdot.zu{background:var(--green2)}
.gdot.ges{background:var(--violet2)}
.aps-row.axis{border-top:0;padding:12px 16px 2px;align-items:flex-start}
.aps-row.axis .aps-chip,.aps-row.axis .aps-days{background:transparent;visibility:hidden}
.aps-row.axis .aps-track{height:14px}
.aps-row.axis .aps-track::before{display:none}
.aps-row.axis .aps-track::after{top:0;bottom:-8px}
.aps-row.axis .gtick{top:12px;bottom:-8px}
.aps-card .aps-row:not(.axis):hover{background:var(--hover)}
/* Bewerbungs-Trichter: Versandt -> Rueckmeldung -> Gespraech -> Zusage */
.aps-top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px 44px;flex-wrap:wrap;margin:8px 0 4px}
.aps-top .aps-stats{margin:0}
.funnel{flex:0 1 340px;min-width:250px;display:flex;flex-direction:column;gap:5px;padding-bottom:3px}
.frow{display:flex;align-items:center;gap:10px}
.fl{flex:none;width:96px;font-size:10.5px;font-weight:650;letter-spacing:.06em;
  text-transform:uppercase;color:var(--mut1);text-align:right}
.fbar{flex:1;height:10px;background:var(--panel);border-radius:999px;overflow:hidden}
.ff{display:block;height:100%;border-radius:999px}
.ff.f1{background:#D4D6D1}
.ff.f2{background:#AEB1AC}
.ff.f3{background:var(--violet2)}
.ff.f4{background:var(--green2)}
.fn{flex:none;width:26px;font:600 12.5px var(--mono);color:var(--text2);text-align:right;font-variant-numeric:tabular-nums}
/* fixed-width right-hand columns: every row's track gets the SAME width, so the
   day-14 tick (a per-track percentage) lines up vertically across rows */
.aps-days{flex:none;font:500 12px var(--mono);color:var(--meta);width:58px;text-align:right}
.aps-chip{flex:none;font-size:11px;font-weight:600;border-radius:7px;padding:3px 4px;
  background:var(--panel);color:var(--meta);white-space:nowrap;
  width:116px;text-align:center;overflow:hidden;text-overflow:ellipsis}
.aps-chip.warn{color:var(--amber)}
.aps-chip.ges{color:var(--violet)}
.aps-chip.ok{background:var(--green-bg);color:var(--green)}
.aps-chip.bad{color:var(--red2)}
.aps-btns{display:flex;gap:5px;flex:none;width:262px;justify-content:flex-end;flex-wrap:wrap}
.aps-btn{font-size:11.5px;font-weight:600;color:var(--meta);background:transparent;
  border:1px solid transparent;border-radius:999px;padding:3.5px 8px;cursor:pointer;white-space:nowrap;
  transition:color .12s ease,background .12s ease,border-color .12s ease}
.aps-btn:hover{color:var(--ink);background:var(--hover)}
.aps-btn.on{color:var(--ink);border-color:var(--ink)}
.aps-src{font-size:11px;color:var(--mut3);margin-top:8px}
@media (max-width:640px){
  .aps-row{flex-wrap:wrap;row-gap:5px}
  .aps-row .m{flex:1 1 100%}
  .listcard .row{padding:13px 14px}
  .listcard .deepwrap{padding:0 14px 14px}
  .racts{padding-left:55px}
  .rbar .rl{flex-basis:120px}
  .rbar .tgl{display:none}
}

/* ---------- prüfseite ---------- */
.pcard{border:1px solid var(--b07);border-radius:18px;padding:17px 19px;margin-bottom:12px;background:var(--card);box-shadow:var(--shadow)}
.pcard-h{display:flex;align-items:flex-start;gap:14px}
.pcard-h .t{font-size:15.5px;font-weight:650;letter-spacing:-.015em}
.pcard-h .s{font-size:13px;color:var(--meta);margin-top:2px}
.pcard-h a.pmain{flex:1}
.pfit{flex:none;text-align:left;white-space:nowrap}
.pfit b{font:600 15px var(--mono);display:inline-block;padding:5px 12px;border-radius:999px;
  font-variant-numeric:tabular-nums;border:1px solid transparent}
.pfit b.fitc-h{background:var(--green-bg);border-color:var(--green-line)}
.pfit b.fitc-m{background:var(--amber-bg);border-color:var(--amber-line)}
.pfit b.fitc-l{background:var(--red-bg);border-color:var(--red-line)}
.pfit>span{display:none} /* "/ 100" — die getönte Pille sagt es bereits */
.pbody{display:grid;grid-template-columns:1.4fr 1fr;gap:22px;margin-top:14px}
.plabel{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--mut1);margin-bottom:6px}
.pbody .dl{font-size:13.5px;line-height:1.55;padding:2px 0}
.pacts{display:flex;flex-direction:column;gap:7px}
.btn-act{text-align:left;font-size:13px;font-weight:600;border-radius:999px;padding:7px 14px;
  transition:border-color .12s ease,color .12s ease,background .12s ease}
.btn-act.a1{color:#fff;background:var(--ink);border:1px solid var(--ink);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 1px 2px rgba(20,21,19,.18)}
.btn-act.a1:hover{background:var(--ink-hover);border-color:var(--ink-hover)}
.btn-act.a1:active{transform:translateY(1px)}
.btn-act.a2{color:var(--text2);background:#fff;border:1px solid var(--b12)}
.btn-act.a2:hover{border-color:var(--ink)}
.btn-act.a3{color:var(--meta);background:transparent;border:1px solid transparent}
.btn-act.a3:hover{color:var(--red);background:var(--red-bg)}
.checkchip{margin-top:9px;font-size:12.5px;font-weight:600;color:var(--ink);background:var(--chipbg);
  border-radius:6px;padding:5px 9px;display:inline-block}

/* ---------- Redesign 2026-07-10: flache Startliste, Wartungspunkt, Tür-Karte ---------- */
.attn{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--amber);
  margin-left:6px;vertical-align:2px}
.newchip{flex:none;font-size:10.5px;font-weight:700;color:var(--green2);background:var(--green-bg);
  border:1px solid var(--green-line);border-radius:999px;padding:2px 8px;white-space:nowrap}
.headcnt{font:600 13px var(--mono);color:var(--meta);margin-left:6px}
.pruefrow{display:block;width:100%;margin-top:14px;padding:13px;border:1px dashed var(--b12);
  border-radius:14px;background:transparent;font-size:13px;font-weight:600;
  color:var(--meta);text-align:center;cursor:pointer;transition:border-color .12s ease,color .12s ease}
.pruefrow:hover{border-color:var(--b18);color:var(--ink)}
.doorcard{display:block;margin:16px 0;padding:14px 16px;border:1px solid var(--b12);
  border-radius:16px;background:var(--card);box-shadow:var(--shadow);font-size:14.5px;font-weight:650;
  color:var(--ink);text-decoration:none;
  transition:box-shadow .15s ease,border-color .12s ease,transform .15s ease}
.doorcard:hover{border-color:var(--b14);box-shadow:var(--shadow-h);transform:translateY(-1px)}
.doorcard .s{display:block;font-size:12px;font-weight:500;color:var(--meta);margin-top:3px}
/* (.aps-overhead entfernt 2026-07-11 #2 — die Kennzahlen-Zeile trägt "nachfassen" jetzt selbst) */

/* ---------- verworfen ---------- */
.vrow .rtitle{font-size:14px;color:var(--dim-title)}
.vrow .rmeta{font-size:12px;color:var(--dim-meta);margin-top:1px}
.vrow .rfitn{flex:none;font:600 15px var(--mono);color:var(--mut1);width:32px;text-align:right}

/* ---------- archiv (Umbau user 2026-07-11: Label-Köpfe, Tabellen-Karten, ruhige Zahlen,
     Bestands-Hero + Sprungleiste + Grund-Balkendiagramm) ---------- */
.hero.sm{margin:12px 0 2px}
.hero.sm .num{font-size:29px;letter-spacing:-.03em;color:var(--text2)}
.hero.sm .hstat{padding:2px 22px 2px 0}
.hero.sm .hstat+.hstat{padding-left:22px}
.arcnav{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 0}
.arcnav button{font-size:12px;font-weight:600;color:var(--text2);background:var(--card);
  border:1px solid var(--b09);border-radius:999px;padding:6px 13px;box-shadow:var(--shadow);
  transition:border-color .12s ease,color .12s ease}
.arcnav button:hover{border-color:var(--b18);color:var(--ink)}
/* Sprung-Ziel nach Chip-Klick kurz markieren (user GO 2026-07-11) */
.arun.flash{animation:secflash 1.5s ease-out 1;border-radius:14px}
@keyframes secflash{0%{box-shadow:0 0 0 8px rgba(25,27,29,.07)}100%{box-shadow:0 0 0 8px rgba(25,27,29,0)}}
@media (prefers-reduced-motion:reduce){.arun.flash{animation:none}}
.rbar{display:flex;align-items:center;gap:12px;width:100%;padding:9px 4px;border:0;
  border-top:1px solid var(--b055);cursor:pointer;text-align:left;background:transparent;
  transition:background .12s ease;border-radius:8px}
.rbar:hover{background:var(--hover)}
.rbar .rl{flex:0 0 220px;font-size:12.5px;font-weight:600;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rbar .rtrack{flex:1;height:8px;background:var(--panel);border-radius:999px;overflow:hidden}
.rbar .rfill{display:block;height:100%;background:#C0C2BD;border-radius:999px;transition:background .12s ease}
.rbar:hover .rfill{background:var(--ink)}
.rbar .rn{flex:none;width:36px;font:600 12.5px var(--mono);color:var(--text2);text-align:right;font-variant-numeric:tabular-nums}
.rbar .tgl{flex:none;width:80px;font-size:11.5px;color:var(--mut2);text-align:right}
/* Vollbreiter, klar als Knopf erkennbarer Aufklapper (Offline-Sektion, user GO 2026-07-11) */
.expbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;
  padding:11px 14px;font-size:13px;font-weight:600;color:var(--text2);background:var(--card);
  border:1px solid var(--b12);border-radius:12px;box-shadow:var(--shadow);cursor:pointer;
  transition:border-color .12s ease,color .12s ease}
.expbtn:hover{border-color:var(--b18);color:var(--ink)}
.expbtn::after{content:"▾";font-size:11px;color:var(--mut2)}
.expbtn.open::after{content:"▴"}
.alwcard{padding:8px 18px 16px;margin-top:12px}
.alwcard>div+div{border-top:0}
.arun{margin-top:30px;scroll-margin-top:70px}
.arunhead{display:flex;align-items:center;gap:8px;padding:0 0 8px;border-bottom:1px solid var(--b08);flex-wrap:wrap}
.arunhead .rdate{font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--meta)}
.arunhead .rid{font:600 11.5px var(--mono);color:var(--meta);background:var(--chipbg);border-radius:999px;padding:1px 8px}
.arunhead .rlabel{flex:1 0 100%;min-width:100%;font-size:12.5px;color:var(--mut1);margin-top:4px}
/* Archiv-Sektionsköpfe tragen mehr Gewicht als die Lauf-Köpfe im Feed (user GO 2026-07-11) */
.arunhead.sect{padding-bottom:10px;border-bottom-color:var(--b14)}
.arunhead.sect .rdate{font-size:13px;letter-spacing:.07em;color:var(--text2)}
.arow{display:flex;align-items:center;gap:12px;padding:9px 2px;border-top:1px solid var(--b05)}
.arow .rtitle{font-size:13.5px;font-weight:600;color:var(--dim-title)}
.arow .rmeta{font-size:12px;color:var(--dim-meta);margin-top:1px}
.areason{flex:none;font-size:12px;font-weight:500;color:var(--dim-meta);white-space:nowrap}
.areason b{color:var(--dim-title);font-weight:600}
.afit{flex:none;font:500 13px var(--mono);color:var(--mut1);width:26px;text-align:right}
.arow .btn-g{padding:4px 7px;border-radius:6px}
.adeep{padding:2px 2px 11px 18px}
/* In den Grund-Gruppen ist die Gruppe selbst der Grund — die Zeilen-Wiederholung entfällt.
   AUSNAHME (user GO 2026-07-11): sagt der feine Grund mehr als der Familien-Balken
   (z. B. "Werkstudent" unter Vertragsart), bleibt er als .sub sichtbar. */
.arclist.bygrund .areason{display:none}
.arclist.bygrund .areason.sub{display:inline}
/* Unter Fit-40: der Sektionskopf IST der Grund — 13x "Grund: Fit unter 40 (Opus)" in den
   Zeilen war reine Wiederholung und zwang Fit+Details auf dem Handy in eine dritte Zeile.
   Der Score bleibt als nackte Zahl prominent (er ist hier selbst der Grund). */
.arclist.nogrund .areason{display:none}
/* Score tritt zurück, wo er nicht der Grund war (user GO 2026-07-11) */
.arclist.bygrund .afit{width:auto;font-size:11.5px}
.arclist.bygrund .afit:not(:empty)::before{content:"Fit ";font-size:10px;color:var(--mut2)}
/* Stufen-Vermerk: welche Pipeline-Stufe hat den Rauswurf entschieden */
.stagechip{flex:none;font:500 10.5px var(--mono);color:var(--mut2);background:var(--panel);
  border:1px solid var(--b08);border-radius:999px;padding:1.5px 7px;white-space:nowrap}
/* Archiv-Zahlen gedämpft: die Fit-Ampel gehört den OFFENEN Stellen, nicht dem Rückspiegel */
.arow .afit,.vrow .rfitn{color:var(--mut1) !important}
.listcard .arow{border-top:0;padding:12px 16px}
.listcard .vrow{padding:12px 16px}
.listcard .adeep{padding:0 16px 14px 35px}
.listcard .initwhy{margin:0 16px 12px 35px}

/* ---------- scout export bar ---------- */
.exportbar[hidden]{display:none}
.exportbar{position:sticky;bottom:0;background:rgba(250,250,248,.85);
  -webkit-backdrop-filter:blur(14px) saturate(1.5);backdrop-filter:blur(14px) saturate(1.5);
  border-top:1px solid var(--b08);box-shadow:0 -6px 18px rgba(20,21,19,.04);
  padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.exportbar .info{font-size:13px;color:var(--meta)}
.exportbar .info b{color:var(--ink);font-family:var(--mono)}
.btn-export{font-size:12.5px;font-weight:600;color:#fff;background:var(--ink);border-radius:999px;
  padding:6px 13px;transition:background .15s ease,transform .06s ease;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 1px 2px rgba(20,21,19,.18)}
.btn-export:hover{background:var(--ink-hover)}
.btn-export:active{transform:translateY(1px)}
.exporthint{display:none;font-size:11.5px;color:var(--mut2);flex-basis:100%}
.exportout.show+.exporthint{display:block}
.exportout{width:100%;height:96px;font-family:var(--mono);font-size:11.5px;color:var(--text2);
  border:1px solid var(--b09);border-radius:8px;padding:8px;background:var(--panel);
  display:none;resize:vertical}
.exportout.show{display:block}
/* Sende-Pille (user 2026-07-11, „Balken ein für alle Mal raus"): mit konfigurierter Tür
   ersetzt sie den Klebebalken komplett. Sie erscheint NUR, wenn geparkte Tür-Pakete
   warten (die Artefakt-Sandbox verschluckt window.open, Markierungen sammeln sich in
   der Outbox) — EIN Antippen verschifft alles zusammen. Ohne Tür bleibt der alte Balken. */
.sendpill{position:fixed;right:14px;bottom:calc(14px + env(safe-area-inset-bottom,0px));z-index:60;
  display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#fff;
  background:var(--ink);border-radius:999px;padding:11px 17px;text-decoration:none;
  box-shadow:0 6px 18px rgba(20,21,19,.28),inset 0 1px 0 rgba(255,255,255,.12)}
.sendpill:hover{background:var(--ink-hover)}
.sendpill:active{transform:translateY(1px)}

   zweiten Zeile ihr border-left — eine hängende Trennlinie am Zeilenanfang (Start:

<script id="app-js">
"use strict";
(function () {
  /* ---------------- data loading (contract unchanged) ---------------- */
  function normalize(raw){
    if (!raw) return null;
    var meta = raw._meta || {};
    var seen = Array.isArray(raw.seen) ? raw.seen : (Array.isArray(raw) ? raw : []);
    return { meta: meta, seen: seen };
  }
  /* Tür-Dashboard-Modus (user GO 2026-07-11): auf GitHub Pages neben der Tür-GUI läuft
     dieselbe Seite mit window.__DOOR_DASH__=1 (build_door_dash.py). Daten kommen dann
     LIVE über das token-geprüfte door.gs aus Drive (action=data) — diese Anzeige kann
     nie veralten, weil es keine eingebackene Kopie gibt. Der letzte gute Stand liegt
     als Zwischenspeicher in localStorage: er wird beim Öffnen SOFORT gezeigt (kein
     Warten) und im Hintergrund durch die frische Antwort ersetzt; bei Störung bleibt
     er stehen und ein Banner nennt sein Alter. Konfiguration wird von der Tür-GUI
     MITBENUTZT (gleiche Domain, gleiche localStorage-Schlüssel door.url/door.token) —
     der Nutzer richtet nichts doppelt ein. */
  var DOOR_DASH = (typeof window !== "undefined") && !!window.__DOOR_DASH__;
  var DASH_CACHE_KEY = "jobscout-dash-cache";
  function doorDataCfg(){
    if (typeof window!=="undefined" && window.__DOOR_DEMO__) return { url: "https://demo.invalid/exec", token: "demo" };
    try {
      var u = (localStorage.getItem("door.url") || "").trim();
      var t = (localStorage.getItem("door.token") || "").trim();
      return /^https:\/\/.+/.test(u) && t ? { url: u, token: t } : null;
    } catch(e){ return null; }
  }
  function dashCache(){
    try { var c = JSON.parse(localStorage.getItem(DASH_CACHE_KEY) || "null");
          return c && c.payload ? c : null; } catch(e){ return null; }
  }
  function saveDashCache(payload){
    try { localStorage.setItem(DASH_CACHE_KEY, JSON.stringify({ t: new Date().toISOString(), payload: payload })); }
    catch(e){ /* voll/gesperrt: dann eben ohne Zwischenspeicher */ }
  }
  /* Bundle -> Seite: setzt die optionalen Zusatzdaten (Bewerbungsstatus, Allowlist-
     Spiegel) auf die bekannten window-Globals, damit alle Verbraucher unverändert
     bleiben. Im seen-only-Modus bleiben die beim Bau eingebackenen Werte stehen. */
  function applyBundle(j){
    if (!j) return null;
    if (j.applog) window.__APPLOG__ = j.applog;
    if (j.allowlist) window.__ALLOWLIST__ = j.allowlist;
    if (j.neverlist) window.__NEVERLIST__ = j.neverlist;
    return normalize(j.data || j);
  }
  function loadData(){
    if (DOOR_DASH){
      // Vorschau-Modus: eingebackenes Demo-Bündel statt Netz (nie in Produktion gesetzt)
      if (typeof window!=="undefined" && window.__DOOR_DEMO__ && window.__DOOR_DEMO__.data){
        return Promise.resolve({ data: applyBundle(window.__DOOR_DEMO__.data), source: "door" });
      }
      var cfg = doorDataCfg();
      var cached = dashCache();
      var fromCache = function(err){
        return { data: cached ? applyBundle(cached.payload) : null,
                 source: cached ? "cache" : null, doorErr: err, cachedAt: cached && cached.t };
      };
      if (!cfg) return Promise.resolve(fromCache("config"));
      return fetch(cfg.url + "?token=" + encodeURIComponent(cfg.token) + "&action=data",
                   { redirect: "follow" })
        .then(function(r){ return r.json(); })
        .then(function(j){
          if (!j || !j.ok) return fromCache(j && j.error === "auth" ? "config" : "net");
          saveDashCache(j);
          return { data: applyBundle(j), source: "door" };
        })
        .catch(function(){ return fromCache("net"); });
    }
    var rawUrl = window.__RAW_URL__ || null;
    var embedded = normalize(window.__EMBEDDED__);
    var p = Promise.resolve({ data: embedded, source: embedded ? "snapshot" : null });
    if (rawUrl){
      p = fetch(rawUrl, { cache:"no-store" })
        .then(function(r){ return r.ok ? r.json() : Promise.reject(0); })
        .then(function(j){ var d = normalize(j); return d ? { data:d, source:"live" } : { data:embedded, source:"snapshot" }; })
        .catch(function(){ return { data: embedded, source: embedded ? "snapshot" : null }; });
    }
    return p;
  }

  /* ---------------- buckets, marks, labels ---------------- */
  // status -> bucket: treffer | unverif | verworfen(server) | offline | excluded
  function bucketOf(status){
    var s = String(status||"").toLowerCase();
    if (s.indexOf("included")===0)   return "treffer";
    if (s.indexOf("unverified")===0) return "unverif";
    if (s === "closed-user-dismissed") return "verworfen";
    if (s.indexOf("closed")===0)     return "offline";
    return "excluded";
  }
  // short reason for Archiv rows ("Grund: …"), derived from the status slug
  function reasonOf(st){
    var s = String(st||"").toLowerCase();
    if (s==="closed-dead") return "Offline (404/410)";
    if (s==="closed-soft-dead") return "Besetzt";
    if (s.indexOf("closed-dead")===0) return "Offline";
    if (s==="closed-user-checked") return "Von dir geprüft";
    if (s==="closed-user-applied") return "Beworben";
    if (s.indexOf("closed")===0) return "Offline";
    if (s.indexOf("werkstudent")>=0) return "Werkstudent";
    if (s.indexOf("praktikum")>=0 || s.indexOf("intern")>=0) return "Praktikum";
    if (s.indexOf("freelance")>=0) return "Freelance";
    if (s.indexOf("contract")>=0) return "Vertragsart";
    if (s.indexOf("location")>=0) return "Standort";
    if (s.indexOf("seniority")>=0 || s.indexOf("senior")>=0 || s.indexOf("title")>=0) return "Seniorität";
    if (s.indexOf("defense")>=0) return "Branche (Defense)";
    if (s.indexOf("sector")>=0 || s.indexOf("finance")>=0 || s.indexOf("insurance")>=0) return "Branche";
    if (s==="excluded-anonymous") return "Anonym (kein Firmenname)";
    if (s==="excluded-belowfloor") return "Fit unter 40 (Opus)";
    if (s.indexOf("employer")>=0) return (s.indexOf("anonymous")>=0 ? "Anonym" : "Arbeitgeber");
    if (s.indexOf("role")>=0) return "Rolle";
    if (s.indexOf("duplicate")>=0) return "Dublette";
    if (s.indexOf("training")>=0) return "Bildungsanbieter";
    if (s.indexOf("industrial")>=0) return "Industrie-Automatisierung";
    if (s.indexOf("deepcheck")>=0) return "Deep-Check-Reject";
    return "Ausgeschlossen";
  }
  /* ---- Aussortiert-Gruppierung: EIN Grund-Vokabular über alle Stufen (user GO 2026-07-11).
     Die Balken heißen nach dem GRUND des Rauswurfs, nie nach der Pipeline-Stufe — ANZEIGE-ONLY
     (Status, DB und Gates bleiben unberührt). User-Entscheide: Bank-Eigentümer + Defense zählen
     zur Branche, Bildungsanbieter zum Arbeitgeber, Werkstudent/Praktikum/Freelance zur
     Vertragsart. Tiefencheck-Rejects werden deterministisch aus note + VERDICT-Zeile
     klassifiziert; die Regel-Reihenfolge folgt der Härte der Ausschlüsse (Defense/Sektor vor
     Anonym vor Standort ...). Kein Muster => ehrlich "Tiefencheck — sonstige" (fail-open;
     kalibriert 2026-07-11 an allen 163 Bestands-Rejects: 0x sonstige). */
  var DC_RULES = [
    ["Branche",     /verteidigung|defense|bundeswehr|r[uü]stung|wehrtechnik|milit[aä]r/],
    ["Branche",     /(^|[^n])bank|versicherung|insurance|finanz|finance|financial|kanzlei|law firm|steuerberat|\btax\b|wirtschaftspr[uü]f|audit|rotation|sektor|sector|eigent[uü]m/],
    ["Anonym",      /anonym|personalvermitt|vermittler|endkunde|staffing|headhunt|recruiting-?agentur/],
    ["Standort",    /standort|location|pr[aä]senz|onsite|on-site|vor ort|vor-ort|pendel|70 ?km|umzug|relocat|hybrid|b[uü]ro/],
    ["Vertragsart", /vertrag|befrist|werkstudent|praktik|internship|freelance|contractor|\bcontract\b|v\.i\.e|teilzeit|ausbildung|trainee|festanstellung|zeitarbeit/],
    ["Seniorität",  /seniorit|\bsenior\b|\blead\b|\bprincipal\b|\barchitekt|\barchitect|head of|\bexperte?\b|jahre.{0,15}erfahrung|berufserfahrung|years?.{0,15}experience/],
    ["Rolle",       /\brolle\b|\brole\b|marketing|sales|vertrieb|scope|people-?management|kein(e)? (ki|ai)|not-ai|projektleit/],
    ["Arbeitgeber", /ausschlussliste|blacklist/]
  ];
  function grundOf(it){
    var s = String(it.status||"").toLowerCase();
    if (s.indexOf("excluded-deepcheck")===0){
      var e = it.raw || {};
      if (e.bankOwned) return "Branche";
      var vm = /VERDICT[^\n]*/i.exec(String(e.dossier||""));
      var txt = (String(e.note||"")+" || "+(vm ? vm[0] : "")).toLowerCase();
      for (var i=0;i<DC_RULES.length;i++){ if (DC_RULES[i][1].test(txt)) return DC_RULES[i][0]; }
      return "Tiefencheck — sonstige";
    }
    var r = it.reason || reasonOf(s);
    if (r==="Werkstudent" || r==="Praktikum" || r==="Freelance") return "Vertragsart";
    if (r==="Branche (Defense)") return "Branche";
    if (r==="Bildungsanbieter") return "Arbeitgeber";
    if (r==="Industrie-Automatisierung") return "Rolle";
    if (r.indexOf("Anonym")===0) return "Anonym";
    if (r==="Ausgeschlossen") return "Sonstige";
    return r;   // Standort / Seniorität / Branche / Rolle / Vertragsart / Arbeitgeber / Dublette
  }
  // Welche Stufe hat entschieden? Nur wo der Urheber SICHER ist; Alt-Slugs aus der
  // Vor-Gate-Ära (z. B. excluded-location-*) bekommen ehrlich keinen Vermerk.
  function stageOf(st){
    var s = String(st||"").toLowerCase();
    if (s.indexOf("excluded-t1-")===0) return "Kurzcheck";
    if (s.indexOf("excluded-deepcheck")===0) return "Tiefencheck";
    if (/^excluded-(title|seniority|contract|werkstudent|praktikum|freelance|employer|defense|training|industrial)/.test(s)) return "Vorfilter";
    return "";
  }
  var MARKLABEL = { bewerben:"Bewerben", ueberlegen:"Überlegen", beworben:"Beworben", geprueft:"Geprüft", verworfen:"Verworfen" };

  /* ---------------- state ---------------- */
  var MARKS_KEY = "jobscout-marks-v2";
  var state = {
    items: [], meta: {}, runsMeta: {}, runOrder: [],
    view: "overview", source: null, loadedAt: null,
    marks: loadMarks(), logmarks: loadLogmarks(), open: {}
  };
  function loadMarks(){ try{ return JSON.parse(localStorage.getItem(MARKS_KEY)||"{}")||{}; }catch(e){ return {}; } }
  function saveMarks(){ try{ localStorage.setItem(MARKS_KEY, JSON.stringify(state.marks)); }catch(e){} }
  /* (Der ✉-Anschreiben-Vormerk-Toggle ist entfernt, user 2026-07-11 — Anschreiben laufen
     ausschließlich über die Bewerbungs-Tür ("Paket anfordern"). Ein evtl. noch gespeicherter
     jobscout-letters-v1-Schlüssel im localStorage bleibt unangetastet, wirkt aber nicht mehr.) */
  /* Bewerbungslog-Statusmeldungen (Bewerbungsstatus-Buttons): lokal vorgemerkt, wandern
     über die Exportleiste als Log-Verben (gespraech/absage/zusage) an den Scout, der sie
     via applog.py ins Drive-Bewerbungslog bucht. Keyed by the export's norm key. */
  var LOGMARKS_KEY = "jobscout-logmarks-v1";
  function loadLogmarks(){ try{ return JSON.parse(localStorage.getItem(LOGMARKS_KEY)||"{}")||{}; }catch(e){ return {}; } }
  function saveLogmarks(){ try{ localStorage.setItem(LOGMARKS_KEY, JSON.stringify(state.logmarks)); }catch(e){} }
  function applogData(){ return (typeof window!=="undefined" && window.__APPLOG__) || null; }
  function toggleLogmark(key, status, firma){
    var cur = state.logmarks[key];
    var today = new Date().toISOString().slice(0,10);
    if (cur && cur.status===status){
      delete state.logmarks[key];
      doorShip([{ id: firma || key, action: cur.status, date: today, undo: true }]);
    } else {
      state.logmarks[key] = { status: status, firma: firma, date: today };
      doorShip([{ id: firma || key, action: status, date: today }]);
    }
    saveLogmarks(); renderAll();
  }
  function pruneLogmarks(){
    var A = applogData();
    if (!A || !A.entries) return;
    var removed = false;
    Object.keys(state.logmarks).forEach(function(k){
      var e = A.entries.find(function(x){ return x.key===k; });
      // drop marks the log has caught up with (or whose row vanished from the export)
      if (!e || e.status===state.logmarks[k].status){ delete state.logmarks[k]; removed = true; }
    });
    if (removed) saveLogmarks();
  }

  /* ---------------- enrich ---------------- */
  function esc(s){ return String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
  function idOf(e){ return e.url || ((e.company||"") + "|" + (e.title||"")); }
  function fitClass(f){ return f>=80 ? "fitc-h" : f>=60 ? "fitc-m" : "fitc-l"; }
  function mainOpen(it, cls){
    return it.url
      ? '<a class="'+cls+' rmain-link" href="'+esc(it.url)+'" target="_blank" rel="noopener noreferrer">'
      : '<div class="'+cls+'">';
  }
  function mainClose(it){ return it.url ? "</a>" : "</div>"; }

  // Deep-check panel content: verdict + "—" lines, derived from dossier/note.
  function buildDeep(e, bucket){
    var lines = [], verdict = "";
    var md = typeof e.dossier === "string" ? e.dossier : "";
    var vm = md.match(/\*\*\s*Verdikt:?\s*([^*]+)\*\*/i);
    if (vm) verdict = vm[1].trim().replace(/\s+/g," ");
    if (!verdict){
      verdict = { treffer:"Treffer", unverif:"Unverifiziert", offline:"Offline",
                  excluded:"Ausgeschlossen", verworfen:"Verworfen" }[bucket] || "Deep-Check";
    }
    function push(t){
      t = t.replace(/\*\*([^*]*)\*\*/g,"$1").replace(/`([^`]*)`/g,"$1").trim();
      if (t && lines.length < 18) lines.push(t);
    }
    if (md){
      var raw = md.replace(/\r\n?/g,"\n").split("\n");
      var inTable = false, tableRow = 0;
      for (var i=0;i<raw.length;i++){
        var t = raw[i].trim();
        if (!t){ inTable = false; tableRow = 0; continue; }
        if (/^#{1,6}\s/.test(t) || /^(\*\*\*|---|___)$/.test(t)) { inTable=false; tableRow=0; continue; }
        if (t.indexOf("|") !== -1 && /\|/.test(t)){
          if (/^\s*\|?[\s:|-]+\|?\s*$/.test(t)) { continue; }        // separator
          var cells = t.replace(/^\|/,"").replace(/\|$/,"").split("|")
            .map(function(c){ return c.trim(); }).filter(Boolean);
          if (!inTable){ inTable = true; tableRow = 0; }
          tableRow++;
          if (tableRow === 1) continue;                               // header row
          if (cells.length >= 2) push(cells[0] + ": " + cells.slice(1).join(" — "));
          else if (cells.length) push(cells[0]);
          continue;
        }
        inTable = false; tableRow = 0;
        if (/^[-*]\s+/.test(t)) { push(t.replace(/^[-*]\s+/,"")); continue; }
        push(t);
      }
      // drop the verdict duplicate + the "Stelle:" heading remnants
      lines = lines.filter(function(l){ return !/^Verdikt/i.test(l) && !/^Stelle:/i.test(l); });
    }
    if (!lines.length && e.note) {
      String(e.note).split(/(?<=[.!?])\s+/).forEach(push);
    }
    // 🏦 Bank/Investmentbank/Bankenkonsortium/Versicherung als (Mit-)Eigentümer = Ausschluss
    // (user GO 2026-07-10) — immer als erste Zeile im Deep-Panel. Finanzinvestoren jeder Art
    // (VC/PE-Buyout/Family Office): gar kein Vermerk (user 2026-07-10, "kein Problem").
    if (e.bankOwned) lines.unshift("EIGENTÜMER-AUSSCHLUSS: " + (e.ownershipNote || "Eine Bank, Investmentbank, ein Bankenkonsortium oder eine Versicherung ist (Mit-)Eigentümer dieses Arbeitgebers — Ausschlusskriterium (Deep-Check-Fund)."));
    if (!lines.length) lines.push("Kein Deep-Check-Text vorhanden.");
    if (lines.length >= 18) lines.push("… (gekürzt — vollständig im Datensatz)");
    return { verdict: verdict, lines: lines };
  }

  // V9 (user GO 2026-07-08): deterministic "Grund"-badges for the Prüfliste — WHAT is still
  // open on an unverified entry, derived from the gate fields the workflow already writes.
  // Since the 3-Bereiche redesign (user 2026-07-08) the fit score is NOT a "Grund" here — a
  // fully assessed fit-46 entry is belegt, just borderline; the score chip already shows it.
  function whyOf(e){
    var w = [];
    var hasGates = ("livenessConfirmed" in e) || ("locationConfirmed" in e) || ("sectorConfirmed" in e);
    if (!hasGates){ w.push("Alt (vor den Gates)"); return w; }
    if (e.livenessConfirmed !== true) w.push("Liveness offen");
    if (e.locationConfirmed === false) w.push("Standort unklar");
    if (e.sectorConfirmed === false) w.push("Sektor nicht belegbar");
    if (!w.length) w.push("bewertet — unter Match-Schwelle 50");
    return w;
  }

  function deepPanelHTML(it, opts){
    var d = deepOf(it);
    // Details-Stufe (user GO 2026-07-11): Urteil + Gate-Zeilen + "Lücken" sofort sichtbar,

    // erkennt der Code das Muster nicht (Alt-/Kurzcheck-Dossiers) oder lohnt die Stufe
    // nicht, wird ALLES gezeigt wie zuvor — es kann nie Information verschwinden, nur
    // eine Tipp-Ebene dazwischenliegen. Das gespeicherte Dossier bleibt unberührt.
    var GATES = /^(VERDICT|Arbeitgeber|Sektor|Standort|Titel-Seniorität|Titel|Seniorität|Vertrag|Rolle|Liveness|Lücken)\b/;
    var fitTxt = (it && it.fit != null) ? ' · Fit '+it.fit : "";

    var vis = [], rest = [];

      // VERDICT-Präfix-Dopplung kappen (nur das exakte Standardmuster; Urteil + Fit stehen

      l = l.replace(/^VERDICT:\s*[a-zA-Z-]+\s*—\s*Fit\s*\d+\s*\/\s*100\s*—\s*/, "");

  /* ---- Lauf-Journal (user GO 2026-07-11): "was hat jeder Lauf gebracht?" ----
     Gruppiert nach lastChanged (== it.run, die dokumentierte Feed-Konvention): Treffer und
     Prüflisten-Zugänge werden als ZEILEN gezeigt (da entscheidet der Nutzer), Buchhaltung
     (geschlossen/aussortiert/von dir erledigt) nur als Zahlen — Details stehen im Archiv. */
  function runDigest(rid){
    var d = { treffer: [], pruef: [], off: 0, exc: 0, user: 0 };
    state.items.forEach(function(it){
      if (it.run !== rid) return;
      if (it.bucket === "treffer") d.treffer.push(it);
      else if (it.bucket === "unverif") d.pruef.push(it);
      else if (it.bucket === "verworfen") d.user++;
      else if (it.bucket === "offline"){
        if (String(it.status).toLowerCase().indexOf("closed-user") === 0) d.user++; else d.off++;
      }
      else d.exc++;
    });
    var byFit = function(a,b){ return b.fit - a.fit; };
    d.treffer.sort(byFit); d.pruef.sort(byFit);
    d.rows = d.treffer.length + d.pruef.length;
    d.any = !!(d.rows || d.off || d.exc || d.user);
    return d;
  }
  function runChips(d){
    var c = [];
    if (d.treffer.length) c.push('<span class="jchip g">+'+d.treffer.length+' Treffer</span>');
    if (d.pruef.length) c.push('<span class="jchip v">+'+d.pruef.length+' Prüfliste</span>');
    var rest = [];
    if (d.off) rest.push(d.off+" geschlossen");
    if (d.exc) rest.push(d.exc+" aussortiert");
    if (d.user) rest.push(d.user+" von dir erledigt");
    if (rest.length) c.push('<span class="jchip">'+rest.join(" · ")+"</span>");
    return c.join("");
  }
  function runDay(rid){
    var m = /^(\d{4})-(\d{2})-(\d{2})(#(\d+))?$/.exec(String(rid||""));
    if (!m) return { day: String(rid||"—"), no: "" };
    var t = Date.parse(m[1]+"-"+m[2]+"-"+m[3]);
    var days = isNaN(t) ? -1 : Math.floor((Date.now()-t)/86400000);
    var day = days===0 ? "Heute" : days===1 ? "Gestern"
      : new Date(t).toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"}).replace(",","");
    return { day: day, no: m[5] ? "Lauf "+m[5] : "" };
  }

  /* Start = flache Trefferliste (Redesign 2026-07-10, user GO): keine Run-Gruppen mehr in der
     Anzeige — die Run-Attribution in der DB bleibt unverändert (per-run tracking). Neue Funde

  function renderOverview(){
    var treffer = visibleIn("treffer").sort(function(a,b){ return b.fit - a.fit; });
    var un = visibleIn("unverif").length;
    var neu = treffer.filter(function(t){

    var chart = "";

    if (runs.length >= 3){
      var vals = runs.map(function(r){ return (r.counts.match||0) + (r.counts.unverified||0); });

    var kick = "";

      }
      kick = '<button class="kick link" data-scrollto="jrnl" title="Zum Lauf-Journal">Letzter Lauf '+
        esc(krd.day)+(krd.no ? " · "+esc(krd.no) : "")+" — <b>"+
        (bits.length ? bits.join(" · ") : "nichts Neues")+"</b> ↓</button>";
    }
    var html = '<div class="view">'+kick+
      '<div class="hero">'+
        '<div class="hstat g"><div class="num">'+treffer.length+'</div><div class="lbl">Offene Treffer</div></div>'+
        '<button class="hstat v link" data-nav="pruefseite" title="Zur Prüfliste"><div class="num">'+un+'</div><div class="lbl">In der Prüfliste</div></button>'+
        '<div class="hstat"><div class="num">'+neu+'</div><div class="lbl">Neu — 3 Tage</div></div>'+
        chart+

    else html += '<div class="listcard">'+treffer.map(rowHTML).join("")+'</div>';
    if (un) html += '<button class="pruefrow" data-nav="pruefseite">'+un+' unverifizierte Stellen warten in der Prüfliste</button>';
    html += journalHTML();
    html += "</div>";

  }

  /* 💡 Initiativ-Kandidaten (user GO 2026-07-10): tote Ex-Treffer mit Fit >= 75 — die Anzeige
     ist weg, aber der BEDARF der Firma war real und das Profil passte nachweislich. Der GRUND
     steht pro Firma auf der Karte (user-Bedingung), deterministisch aus den vorhandenen
     Feldern gebaut (Fit, Lebensdauer der Anzeige, Schließungsart, Rolle) — kein LLM. */
  var INITIATIVE_MIN_FIT = 75;
  function runDayDiff(a, b){
    var ta = Date.parse(String(a||"").split("#")[0]), tb = Date.parse(String(b||"").split("#")[0]);
    return (isNaN(ta)||isNaN(tb)) ? null : Math.max(0, Math.round((tb-ta)/86400000));
  }
  function initiativeItems(){
    return state.items.filter(function(it){
      return it.bucket==="offline" && it.fit >= INITIATIVE_MIN_FIT &&
        String((it.raw||{}).sweptFrom||"").indexOf("included")===0;
    }).sort(function(a,b){ return b.fit-a.fit; });
  }
  function initiativeReason(it){
    var life = runDayDiff((it.raw||{}).firstSeen, (it.raw||{}).lastChanged);
    var gone = it.status==="closed-soft-dead" ? "als besetzt markiert" : "offline genommen";
    var lifeTxt = life===null ? "kurz nach dem Fund" :
      (life===0 ? "noch am Fund-Tag" : "nach "+life+" Tag"+(life===1?"":"en"));
    var log = applogMatch(it);
    // Kürzung (user GO 2026-07-11): nur die variablen Fakten — Fit, Tempo der Schliessung,
    // Schluss daraus. Die Bewerbungslog-Warnung bleibt (verhindert Doppelbewerbung).
    var r = "Fit "+it.fit+" · "+lifeTxt+" "+gone+
      (life!==null && life<=4 ? " — akuter Bedarf, Profil passt." : " — der Bedarf war real.");
    r += log ? " Achtung: Firma schon im Bewerbungslog." : "";
    return r;
  }

        stChip+
        // Fit 0 = nie bewertet (Vorfilter-Drop / Agent-Ausfall) — keine Zahl zeigen,

        (it.fit > 0 ? '<span class="afit '+fitClass(it.fit)+'">'+it.fit+"</span>" : '<span class="afit"></span>')+

  /* ---------- bewerbungen (Anschreiben-Studio surface) ----------
     One page, two modes: published = queue + status + ✉ capture; in Cowork the
     session injects window.__STUDIO__ (schema in studio_render.py) and the same
     tab becomes the LIVE STUDIO: every step is a button — open a posting,
     pick options, send Feinschliff, build the PDF, book "versandt". Buttons
     go to the session over the first working transport (studio_bridge.py),
     the page polls the state (rev counter) and re-renders itself. */
  function studioQueue(){
    var reqs = [], ms = [];
    state.items.forEach(function(it){
      if ((it.bucket!=="treffer" && it.bucket!=="unverif") || it.appliedSrv) return;
      if (it.letterReq) reqs.push(it);
      else if (it.bucket==="treffer") ms.push(it);
    });
    reqs.sort(function(a,b){ return a.letterReq<b.letterReq?-1:a.letterReq>b.letterReq?1:0; });
    ms.sort(function(a,b){ return b.fit-a.fit; });
    return reqs.concat(ms);
  }

  /* --- studio live channel: all transports converge on studio-actions.jsonl.
     bridge = fetch to the session's local helper on 127.0.0.1 (zero clicks);
     fs     = File System Access — the page writes/reads the channel files
              itself after ONE "Verbinden" grant per studio start;
     clip   = clipboard copy, the session ingests via pbpaste (degraded:
              state then arrives by page re-render instead of polling). --- */
  var studio = { mode:"none", bridge:null, busy:false, busySince:0, feedDraft:"",
                 probeSent:false, fsActions:null, fsState:null, lastRev:null,
                 sel:{}, arm:null, note:"", pollT:null };
  function stCfg(){ return studio.bridge || ((window.__STUDIO__||{}).bridge) || null; }
  function stLive(){ return studio.mode==="bridge" || studio.mode==="fs" || studio.mode==="clip"; }
  function stNote(msg){ studio.note = msg || ""; renderAll(); }
  function stInit(){
    var S = window.__STUDIO__; if (!S) return;
    studio.lastRev = (typeof S.rev==="number") ? S.rev : null;
    studio.bridge = S.bridge || null;
    var c = stCfg();
    if (c && c.port && window.fetch){
      fetch("http://127.0.0.1:"+c.port+"/ping")
        .then(function(r){ return r.json(); })
        .then(function(j){ if (j && j.ok) stGo("bridge"); else stOffer(); })
        .catch(stOffer);
    } else stOffer();
  }
  function stOffer(){
    // clipboard is always offerable: stCopy falls back to execCommand("copy"),
    // which needs no permission grant — 🔴 only happens on real copy failure.
    // No auto-probe in clip mode: copying needs a user gesture, and a silent
    // copy would clobber the user's clipboard — the session learns the channel
    // from the first real action's via:"clipboard" instead.
    studio.mode = ("showDirectoryPicker" in window) ? "fs-offer" : "clip";
    renderAll();
  }
  function stGo(mode){ studio.mode = mode; stProbe(); stPollStart(); renderAll(); }
  function stFsConnect(){
    window.showDirectoryPicker({ mode:"readwrite" }).then(function(dir){
      return dir.getDirectoryHandle("job-scout").catch(function(){ return dir; });
    }).then(function(js){
      return js.getFileHandle("ai-job-search-seen.json").then(function(){
        return js.getFileHandle("studio-actions.jsonl", { create:true }).then(function(a){
          studio.fsActions = a;
          return js.getFileHandle("studio-state.json", { create:true });
        }).then(function(s){ studio.fsState = s; stGo("fs"); });
      }, function(){ stNote("Falscher Ordner — bitte den Repo-Ordner (Automation) oder job-scout wählen."); });
    }).catch(function(e){
      if (e && e.name==="AbortError") stNote("Abgebrochen — alternativ „Zwischenablage nutzen“.");
      else stNote("Ordner-Zugriff hier nicht möglich — „Zwischenablage nutzen“ als Ersatz.");
    });
  }
  function stSend(obj){
    if (!stLive()){ stNote("Kein Kanal verbunden."); return; }
    if (studio.busy && obj.action!=="probe") return;
    obj.jobscoutStudio = 1; obj.v = 1;
    var line = JSON.stringify(obj), isProbe = obj.action==="probe";
    var ok = function(){
      if (isProbe) return;
      if (studio.mode==="clip"){ stNote("Kopiert — die Session übernimmt den Befehl automatisch."); return; }
      studio.busy = true; studio.busySince = Date.now(); studio.note = ""; renderAll();
    };
    var fail = function(msg){ if (!isProbe) stNote(msg); };
    if (studio.mode==="bridge"){
      var c = stCfg();
      fetch("http://127.0.0.1:"+c.port+"/action", { method:"POST",
        headers:{ "content-type":"application/json", "x-studio-token":(c.token||"") },
        body: line })
        .then(function(r){ return r.json(); })
        .then(function(j){ if (j && j.ok) ok(); else fail("Brücke lehnt ab ("+((j && j.error)||"?")+")."); })
        .catch(function(){ fail("Brücke nicht erreichbar — Session prüfen oder Seite neu laden."); });
    } else if (studio.mode==="fs"){
      studio.fsActions.getFile().then(function(f){ return f.text(); }).then(function(txt){
        if (txt && txt.slice(-1)!=="\n") txt += "\n";
        return studio.fsActions.createWritable().then(function(w){
          return w.write(txt + line + "\n").then(function(){ return w.close(); });
        });
      }).then(ok, function(){ fail("Schreiben in den Ordner fehlgeschlagen — neu „Verbinden“."); });
    } else {
      stCopy(line).then(ok, function(){ fail("Zwischenablage nicht erlaubt — Notbetrieb: Befehl in die Session-Eingabe tippen."); });
    }
  }
  /* copy with fallback: the async Clipboard API is permission-gated and often
     denied in embedded windows; execCommand("copy") inside the click gesture
     bypasses that gate and is the reliable path there. */
  function stCopy(line){
    var exec = function(){
      return new Promise(function(res, rej){
        var ta = document.createElement("textarea");
        ta.value = line; ta.setAttribute("readonly", "");
        ta.style.position = "fixed"; ta.style.top = "-1000px"; ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus(); ta.select(); ta.setSelectionRange(0, line.length);
        var okd = false;
        try { okd = document.execCommand("copy"); } catch(e){}
        document.body.removeChild(ta);
        if (okd) res(); else rej(new Error("copy failed"));
      });
    };
    return (navigator.clipboard && navigator.clipboard.writeText)
      ? navigator.clipboard.writeText(line).catch(exec)
      : exec();
  }
  function stProbe(){
    if (studio.probeSent) return;
    studio.probeSent = true;
    stSend({ action:"probe", result:{
      channel: studio.mode,
      fsApi: ("showDirectoryPicker" in window),
      clipboardApi: !!(navigator.clipboard && navigator.clipboard.writeText),
      claudeKeys: Object.keys(window.claude || {}),
      proto: location.protocol,
      ua: navigator.userAgent.slice(0,120) } });
  }
  function stPollStart(){
    if (studio.pollT) clearInterval(studio.pollT);
    if (studio.mode!=="bridge" && studio.mode!=="fs") return;
    studio.pollT = setInterval(stPoll, 1500);
  }
  function stPoll(){
    if (studio.busy && Date.now()-studio.busySince > 300000){ studio.busy = false; renderAll(); }
    var apply = function(st){
      if (!st || typeof st.rev!=="number" || st.rev===studio.lastRev) return;
      var ae = document.activeElement;                    // don't yank mid-typing;
      if (ae && ae.id==="stfeed" && ae.value) return;     // next tick retries
      var keepSel = JSON.stringify(st.round||null) === JSON.stringify((window.__STUDIO__||{}).round||null);
      studio.lastRev = st.rev; studio.busy = false; studio.note = "";
      if (!keepSel) studio.sel = {};
      if (st.bridge) studio.bridge = st.bridge;
      window.__STUDIO__ = st; renderAll();
    };
    if (studio.mode==="bridge"){
      var c = stCfg();
      fetch("http://127.0.0.1:"+c.port+"/state", { headers:{ "x-studio-token":(c.token||"") } })
        .then(function(r){ return r.json(); }).then(apply).catch(function(){});
    } else if (studio.fsState){
      studio.fsState.getFile().then(function(f){ return f.text(); })
        .then(function(t){ var st = null; try{ st = JSON.parse(t); }catch(err){} apply(st); })
        .catch(function(){});
    }
  }
  function stApply(){
    var S = window.__STUDIO__; if (!S || !S.round) return;
    var codes = [], missing = [];
    (S.round.parts||[]).forEach(function(pt){
      var c = studio.sel[pt.num] || pt.selected || pt.recommendation;
      if (c) codes.push(String(pt.num)+c); else missing.push(pt.num);
    });
    if (missing.length){ stNote("Teil "+missing.join(", ")+": bitte eine Option anklicken."); return; }
    stSend({ action:"select", codes: codes });
  }
  function stSentClick(){
    if (studio.arm==="sent"){ studio.arm = null; stSend({ action:"sent" }); }
    else {
      studio.arm = "sent"; renderAll();
      setTimeout(function(){ if (studio.arm==="sent"){ studio.arm = null; renderAll(); } }, 3500);
    }
  }
  function stFeedSend(){
    var t = (studio.feedDraft||"").trim();
    if (!t){ stNote("Feinschliff-Feld ist leer."); return; }
    stSend({ action:"feedback", text: t });
    studio.feedDraft = "";
  }
  function stBar(){
    var m = studio.mode;
    var html = '<div class="stbar">';

  /* ---------------- Bewerbungsstatus (Bewerbungslog-Extrakt) ----------------

  function fmtISO(iso){
    if (!iso) return "";

  function renderApplogStatus(){

    var FU = A.followupDays || 14;
    var now = new Date();
    function days(iso){
      if (!iso) return null;

      return n < 0 ? 0 : n;
    }
    var rows = A.entries.map(function(e){
      var dy = days(e.datum);

    });
    var c = { over:0, wart:0, ges:0, zu:0, ab:0 };
    rows.forEach(function(r){
      if (r.e.status==="wartend"){ c.wart++; if (r.overdue) c.over++; }
      else if (r.e.status==="gespraech") c.ges++;
      else if (r.e.status==="zusage") c.zu++;
      else if (r.e.status==="absage" || r.e.status==="zurueckgezogen") c.ab++;

  /* Einfüge-Wächter (aus GUI v6 portiert; lokal, 0 Tokens, asymmetrisch: nur ein
     SICHERER Befund warnt, jede Warnung hat "Trotzdem senden") */
  function pgNorm(s){ return String(s==null?"":s).toLowerCase().replace(/&[a-z]+;/gi," "); }
  var PG_LEGAL = /\b(gmbh|ag|ug|se|kg|kgaa|mbh|inc|ltd|llc|co|haftungsbeschraenkt|haftungsbeschränkt|group|gruppe|holding|international)\b/g;
  function pgCoTokens(co){
    return pgNorm(co).replace(/\(.*?\)/g," ").replace(PG_LEGAL," ")
      .split(/[^a-z0-9äöüß]+/).filter(function(t){ return t.length>=3; });
  }
  function pgTitleTokens(ti){
    return pgNorm(ti).split(/[^a-z0-9äöüß]+/).filter(function(t){ return t.length>=5; });
  }
  function pgMatch(text, item){
    var t = pgNorm(text);
    var co = pgCoTokens((item&&item.company)||"");
    var coFull = co.length>0 && co.every(function(k){ return t.indexOf(k)>=0; });
    var coAny = co.some(function(k){ return t.indexOf(k)>=0; });
    var ti = pgTitleTokens((item&&item.title)||"");
    var tiHits = ti.filter(function(k){ return t.indexOf(k)>=0; }).length;
    return { coFull:coFull, coAny:coAny, tiHits:tiHits,
             ok: coFull || (coAny && tiHits>=1) || tiHits>=2 };
  }
  function pgCross(text, item, others){
    if (pgMatch(text, item).coAny) return null;
    for (var i=0;i<(others||[]).length;i++){
      var o = others[i];
      if (!o || String(o.id)===String(item.id)) continue;
      if (pgMatch(text, o).coFull) return o;
    }
    return null;
  }
  var PG_NAV = ["cookie","impressum","datenschutz","anmelden","login","registrieren",
    "newsletter","akzeptieren","ablehnen","einstellungen","navigation","startseite","warenkorb","agb"];
  function pgChrome(text){
    var t = pgNorm(text);
    return PG_NAV.filter(function(w){ return t.indexOf(w)>=0; }).length >= 4;
  }
  function pgHash(s){
    var t = pgNorm(s).replace(/\s+/g," ").trim(), h = 5381;
    for (var i=0;i<t.length;i++) h = ((h<<5)+h+t.charCodeAt(i))|0;
    return String(h);
  }
  function pgCheck(text, item, others){
    var h = pgHash(text);
    if (P.sentHashes[h]) return { kind:"dup",
      msg:'Das ist derselbe Text wie eben bei „'+P.sentHashes[h]+'" — hast du die neue Anzeige kopiert?' };
    var m = pgMatch(text, item);
    if (pgChrome(text) && !m.ok) return { kind:"chrome",
      msg:"Das sieht nach Webseiten-Gerüst aus (Cookie-/Menü-Texte), nicht nach der Anzeige." };
    if (!m.ok){
      var sus = pgCross(text, item, others);
      if (sus) return { kind:"cross", suspect:sus,
        msg:'Der Text sieht nach „'+(sus.company||"?")+'" aus — du bist aber bei „'+(item.company||"?")+'".' };
      return { kind:"nomatch",
        msg:'Der Text erwähnt weder „'+(item.company||"?")+'" noch Wörter aus dem Stellentitel.' };
    }
    return null;
  }
  function pgChipHTML(text, item){
    if (!text || text.length < 40) return "";
    var m = pgMatch(text, item);
    return (m.coFull || m.coAny)
      ? '<span class="checkchip" style="margin-top:0">✓ '+esc((item&&item.company)||"")+' im Text erkannt</span>'
      : m.ok ? '<span class="checkchip" style="margin-top:0">✓ Titelwörter im Text erkannt</span>'
      : '<span class="whychip floor">⚠ Firma/Titel nicht im Text gefunden</span>';
  }

  function pdcSend(force){
    var B = P.dcb, item = B ? B.items[B.idx] : (P.dc||{});

    if (t.length < 80){ P.flash = "Das ist zu wenig Text — bitte die ganze Anzeige einfügen."; return renderAll(); }
    if (!force){

      if (g){ P.dcWarn = g; P.dcDraft = t; return renderAll(); }
    }
    pdcShip(item, t);

      var n = B.items.length, moved = false;
