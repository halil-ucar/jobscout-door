  /* ---------------- Allowlist governance box (V5, user GO 2026-07-08) ----------------
     Cumulative egress-BLOCKED hosts (persisted per run in _meta.runs[].blockedHosts) vs the
     committed allowlist MIRROR + NEVER list (embedded by build-artifact.py). NEVER hosts are
     shown as gesperrt and never suggested. Normal case: copy the "NEU" block and APPEND it
     (Cloud-Umgebung + allowlist.txt). Removals/changes: replace with the Komplettliste. */
  function allowlistCoveredBy(h, list){
    return (list||[]).some(function(e){
      e = String(e||"").toLowerCase();
      var d = e.indexOf("*.")===0 ? e.slice(2) : e;
      return h===d || h.slice(-(d.length+1))==="."+d;
    });
  }
  function hostOfUrl(u){
    var m = /^[a-z][a-z0-9+.-]*:\/\/([^\/?#]+)/i.exec(String(u||""));
    if (!m) return "";
    return m[1].replace(/^www\./,"").split("@").pop().split(":")[0].toLowerCase();
  }
  /* Attention state for the Übersicht banner (user GO 2026-07-08, "nicht nervig"-Fassung;
     EINE Prüf-Regel seit 2026-07-09 #3): amber IMMEDIATELY on drift (mirror says approved,
     egress blocked = runs are being wasted); ein ungeprüfter Kandidat zählt genau dann, wenn
     er AKTUELL eine offene Prüflisten-Stelle blockiert (sweepStatus=BLOCKED). Otherwise the
     banner does not exist; candidates quietly accumulate in the Archiv box. */
  /* V10 (user GO 2026-07-08): every candidate host carries a cached AGB verdict in
     _meta.hostVerdicts ({v: SAUBER|UNKLAR|NEIN, date, note}) — written ONCE per host by the
     run session via check_allowlist.py --verdict. Only SAUBER hosts ever appear in a copy
     block; UNKLAR is a question to the user; NEIN is suppressed; UNGEPRUEFT is counted only. */
  function verdictOf(host){
    var hv = (state.meta && state.meta.hostVerdicts) || {};
    var v = hv[host] || {};
    return { v: String(v.v||"").toUpperCase(), note: v.note || "", date: v.date || "" };
  }
  function allowlistAttention(){
    var mirror = window.__ALLOWLIST__ || [], never = window.__NEVERLIST__ || [];
    var runs = (state.meta && state.meta.runs) || [];
    if (!runs.length) return null;
    var seenIn = {};                       // host -> distinct run ids it was blocked in
    runs.forEach(function(r){
      ((r && r.blockedHosts) || []).forEach(function(h){
        h = String(h||"").toLowerCase(); if (!h) return;
        seenIn[h] = seenIn[h] || {};
        seenIn[h][r.id] = 1;
      });
    });
    var lastWith = null;                   // drift is judged on the LATEST run with data
    for (var i = runs.length-1; i >= 0; i--){
      if (((runs[i]||{}).blockedHosts||[]).length){ lastWith = runs[i]; break; }
    }
    var drift = [];
    if (lastWith) lastWith.blockedHosts.forEach(function(h){
      h = String(h||"").toLowerCase();
      if (allowlistCoveredBy(h, mirror) && !allowlistCoveredBy(h, never) && drift.indexOf(h)<0) drift.push(h);
    });
    // Kandidaten-Quelle = Lauf-Meldungen (blockedHosts) UND Hosts, die AKTUELL eine offene
    // Prüflisten-Stelle blockieren (sweepStatus=BLOCKED) — geparkte Stellen werden von Läufen
    // nicht erneut angefasst, ihre Hosts fehlten also in den Lauf-Meldungen (Lücke 2026-07-09).
    var blockingHosts = [];
    state.items.forEach(function(it){
      if (it.bucket!=="unverif") return;
      if (String(((it.raw||{}).sweepStatus)||"").toUpperCase() !== "BLOCKED") return;
      var host = hostOfUrl(it.url);
      if (host && blockingHosts.indexOf(host) < 0) blockingHosts.push(host);
    });
    var candSet = Object.keys(seenIn);
    blockingHosts.forEach(function(h){ if (candSet.indexOf(h) < 0) candSet.push(h); });
    var cands = candSet.filter(function(h){
      return !allowlistCoveredBy(h, never) && !allowlistCoveredBy(h, mirror);
    });
    var sauber = [], unklar = [], unchecked = [];
    cands.forEach(function(h){
      var v = verdictOf(h).v;
      if (v === "SAUBER") sauber.push(h);
      else if (v === "UNKLAR") unklar.push(h);
      else if (v !== "NEIN") unchecked.push(h);   // NEIN: user declined -> never surfaces again
    });
    // EINE Prüf-Regel (user GO 2026-07-09 #3, ersetzt recurring/fit>=60/>=8-kumuliert): ein
    // ungeprüfter Host ist prüf-fällig, sobald er NACHWEISLICH mindestens eine offene
    // Prüflisten-Stelle blockiert — seit dem Fehlerklassen-Fix heißt BLOCKED ausschließlich
    // "echte Egress-Sperre", also steckt hinter jedem Treffer dieser Regel realer Nutzen.
    var due = unchecked.filter(function(h){
      return blockingHosts.some(function(b){ return b===h || b.slice(-(h.length+1))==="."+h; });
    });
    var checkDue = due.length > 0;
    // UNKLAR zählt seit 2026-07-11 (user-Regel) als abgelehnt — es löst keine Aufmerksamkeit
    // mehr aus und steckt nicht mehr im Fingerprint.
    if (!(drift.length || sauber.length || checkDue)) return null;
    // Fingerprint semantics: candidate SETS stay acknowledged while unchanged; drift carries the
    // source run id, so a NEW run still showing drift re-raises the banner after "Erledigt".
    var fp = JSON.stringify({ d: drift.slice().sort(), dr: (drift.length && lastWith) ? lastWith.id : "",
      s: sauber.slice().sort(), c: (checkDue ? due.slice().sort() : []) });
    return { drift: drift, sauber: sauber.sort(), unklar: unklar.sort(), unchecked: unchecked.sort(),
      due: due.sort(), checkDue: checkDue, fp: fp };
  }
  /* (Der Übersichts-Allowlist-Banner ist im Redesign 2026-07-10 entfallen — die
     Wartung lebt gebündelt im Archiv; der amber Punkt am Archiv-Tab übernimmt die
     Aufmerksamkeits-Funktion. allowlistAttention() speist beides weiterhin.) */
  function allowlistBoxHTML(){
    var mirror = window.__ALLOWLIST__ || [], never = window.__NEVERLIST__ || [];
    var runs = (state.meta && state.meta.runs) || [];
    if (!mirror.length && !runs.length) return "";
    var counts = {};
    runs.forEach(function(r){
      ((r && r.blockedHosts) || []).forEach(function(h){
        h = String(h||"").toLowerCase(); if (h) counts[h] = (counts[h]||0)+1;
      });
    });
    // Hosts, die AKTUELL offene Prüflisten-Stellen blockieren, zählen auch ohne Lauf-Meldung
    // (geparkte Stellen werden von Läufen nicht erneut angefasst — Lücke 2026-07-09).
    state.items.forEach(function(it){
      if (it.bucket!=="unverif") return;
      if (String(((it.raw||{}).sweepStatus)||"").toUpperCase() !== "BLOCKED") return;
      var h = hostOfUrl(it.url);
      if (h && !counts[h]) counts[h] = 1;
    });
    var sauber = [], unklar = [], unchecked = [], declined = [], gesperrt = [], drift = [];
    Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; }).forEach(function(h){
      if (allowlistCoveredBy(h, never)) gesperrt.push(h);
      else if (allowlistCoveredBy(h, mirror)) drift.push(h);   // laut Spiegel frei, trotzdem BLOCKED
      else {
        var v = verdictOf(h).v;
        if (v === "SAUBER") sauber.push(h);
        else if (v === "UNKLAR") unklar.push(h);
        else if (v === "NEIN") declined.push(h);
        else unchecked.push(h);
      }
    });
    var newBlock = sauber.map(function(h){ return h+"\n*."+h; }).join("\n");
    // AKTIONS-UMBAU (user GO 2026-07-11): oben steht NUR, was jetzt zu tun ist — mit dem
    // Werkzeug (Kopierfeld) direkt in der Karte. Host-Aufzählungen tragen dort nichts (die
    // Lösung ist immer "Liste einsetzen"), deshalb wandert alles Nachschlagbare in Falten.
    function chipsOf(arr, dim){
      return '<div class="hostwrap'+(dim?" dim":"")+'">'+
        arr.map(function(h){ return '<span class="hostchip">'+esc(h)+"</span>"; }).join("")+"</div>";
    }
    function hostFold(label, arr, note){
      if (!arr.length) return "";
      return '<details class="alwfold"><summary>'+label+' <span class="c">'+arr.length+"</span></summary>"+
        (note ? '<div class="alwsec dim">'+note+"</div>" : "")+chipsOf(arr, true)+"</details>";
    }
    // UNKLAR = NICHT SAUBER (user-Regel 2026-07-11): was nicht eindeutig SAUBER ist, gilt
    // als abgelehnt — es gibt keine offene "deine Entscheidung"-Frage mehr im Dashboard.
    declined = declined.concat(unklar);
    var nTodo = (drift.length ? 1 : 0) + (sauber.length ? 1 : 0);
    var html = '<div class="arun alwbox" id="arc-wartung"><div class="arunhead sect">'+
      '<span class="rdate">Allowlist</span>'+
      '<span class="rid">'+(nTodo ? nTodo+" Aufgabe"+(nTodo===1?"":"n")+" offen" : "nichts zu tun")+'</span>'+
      '<span class="rlabel" title="Egress-blockierte Hosts aus den Läufen. Copy-Block nur für AGB-geprüfte (SAUBER) Hosts — Ungeprüftes wird nie zum Einfügen angeboten (V10). NEVER-Hosts erscheinen nie. Nicht eindeutig SAUBER gilt als abgelehnt (user 2026-07-11).">Gesperrte Hosts aus den Läufen — übernommen wird nur, was eindeutig SAUBER ist.</span>'+
    "</div>"+'<div class="listcard alwcard">';
    if (drift.length){
      html += '<div class="alwwarn"><b>Zu tun: Freigabe-Liste neu einsetzen.</b> '+
        drift.length+' Host'+(drift.length===1?" ist":"s sind")+' laut Spiegel längst frei, '+
        (drift.length===1?"war":"waren")+' im letzten Lauf aber trotzdem gesperrt — die Liste in der Cloud-Umgebung ist veraltet. Komplettliste kopieren und dort alles ersetzen:'+
        '<textarea class="alwta" id="alw-full" readonly rows="8">'+esc(mirror.join("\n"))+"</textarea>"+
        '<button class="btn-o" data-copy="alw-full">Komplettliste kopieren · '+mirror.length+' Einträge</button></div>';
    }
    if (sauber.length){
      html += '<div class="alwsec"><b>Zu tun: '+sauber.length+' neue'+(sauber.length===1?"r":"")+' Host'+(sauber.length===1?"":"s")+' freischalten.</b> AGB und Funktion geprüft, Freigabe wirkt — Block kopieren und in der Cloud-Umgebung unten an die Allowlist anfügen:</div>'+
        '<textarea class="alwta" id="alw-new" readonly rows="'+Math.min(10, sauber.length*2)+'">'+esc(newBlock)+"</textarea>"+
        '<button class="btn-o" data-copy="alw-new">NEU-Block kopieren</button>';
    }
    if (!nTodo){
      html += '<div class="alwok"><b>Nichts zu tun.</b>'+(unchecked.length
        ? " "+unchecked.length+" wartende Hosts prüft der Lauf von selbst, sobald einer eine offene Prüflisten-Stelle blockiert."
        : "")+"</div>";
    }
    // Nachschlagen — hier wird nie gehandelt, deshalb alles hinter Falten (user GO 2026-07-11).
    html += hostFold("Ungeprüft", unchecked, "Prüft der nächste Lauf automatisch, sobald ein Host eine offene Prüflisten-Stelle blockiert — bis dahin bleiben sie gesperrt.");
    html += hostFold("Abgelehnt", declined, "Dein Entscheid oder nicht eindeutig SAUBER — wird nie wieder vorgeschlagen.");
    html += hostFold("NEVER-Liste", gesperrt, "Grundsätzlich gesperrt (Botwalls, verbotene AGB) — nie aufnehmen.");
    if (mirror.length && !drift.length){
      html += '<details class="alwfold"><summary>Komplettliste <span class="c">'+mirror.length+"</span></summary>"+
        '<div class="alwsec dim">Nur bei Änderungen oder Entfernungen nötig: alles in der Cloud-Umgebung ersetzen.</div>'+
        '<textarea class="alwta" id="alw-full" readonly rows="8">'+esc(mirror.join("\n"))+"</textarea>"+
        '<button class="btn-o" data-copy="alw-full">Komplettliste kopieren</button></details>';
    }
    html += "</div></div>";
    return html;
  }

  /* ---------------- scout export (action-channel bridge) ----------------
     Final states feed the routine's ingest vocabulary (apply_user_actions.py):
       beworben -> applied · verworfen -> dismissed · geprueft -> checked
     bewerben/ueberlegen are local intent only. Server-side states are skipped. */
  function pendingActions(){
    var out = [];
    state.items.forEach(function(it){
      if (it.appliedSrv || it.bucket==="verworfen") return;   // DB already knows
      var m = state.marks[it.id]; if (!m) return;
      var verb = m.mark==="beworben" ? "applied" : m.mark==="verworfen" ? "dismissed"
               : m.mark==="geprueft" ? "checked" : null;
      if (!verb) return;
      if (verb==="checked" && it.bucket!=="unverif") return;  // checked is unverified-only
      if (it.bucket!=="treffer" && it.bucket!=="unverif") return;
      out.push({ id: it.id, action: verb, date: m.date || new Date().toISOString().slice(0,10) });
    });
    // Bewerbungslog status reports (id = Firma; log-only verbs, see apply_user_actions.py)
    Object.keys(state.logmarks).forEach(function(k){
      var m = state.logmarks[k];
      out.push({ id: m.firma || k, action: m.status, date: m.date });
    });
    return out;
  }
  function renderExportBar(){

      bar.hidden = true;

          '📤 <b>'+obd.length+'</b> nicht gesendet — erneut senden</a>'
        : "";
      return;
    }
    if (doorGui()){
      // Tür konfiguriert (user 2026-07-11): der Klebebalken entfällt ersatzlos — jedes
      // Antippen verschifft selbst über die Tür, und „wartet auf den Scout" ist
      // Maschinenzustand, keine Anzeige. Nur im Sandbox geparkte Pakete brauchen noch
      // EINEN Tipp: die schwebende Sende-Pille (echter <a>-Link, Tab schließt sich selbst).
      bar.hidden = true;

        ? '<a class="sendpill" target="_blank" rel="noopener noreferrer" data-obclear'+
          ' href="'+esc(doorActsUrl(ob))+'"'+
          ' title="Öffnet kurz die Bewerbungs-Tür, die alles sofort in Drive ablegt — der Tab schließt sich von selbst.">'+
          '📤 <b>'+ob.length+'</b> an die Tür senden</a>'
        : "";
      return;
    }
    // Ohne Tür bleibt der alte Weg unverändert: Balken + JSON-Übergabe an den Scout.
    pill.innerHTML = "";
    var acts = pendingActions();
    bar.hidden = !acts.length;
    document.getElementById("exportinfo").innerHTML =
      '<b>'+acts.length+"</b> Markierung"+(acts.length===1?"":"en")+
      (acts.length===1?" wartet":" warten")+" auf den Scout";
    document.getElementById("doorob").innerHTML = "";
  }

    // die 1–2 s Drive-Antwort); die frische Antwort ersetzt ihn gleich darunter.
    if (DOOR_DASH && !state.items.length){
      var c = dashCache();
      if (c){
        var d0 = applyBundle(c.payload);

                 state.source = "cache"; state.cachedAt = c.t; state.loadedAt = new Date(); renderAll(); }

    }

      state.doorErr = r.doorErr || null; state.cachedAt = r.cachedAt || state.cachedAt || null;

      renderAll();
    });

  if (DOOR_DASH){
    (function(){
      var hash = location.hash || "", took = false;
      function dec(s){ return JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(s))))); }
      var m = /#acts=([^&]+)/.exec(hash);
      if (m){ try { var acts = dec(m[1]);
        if (Array.isArray(acts) && acts.length){ doorShip(acts); took = true; } } catch(e){} }
      var md = /#dc=([^&]+)/.exec(hash);
      if (md){ try { var dd = dec(md[1]);
        if (dd && dd.id){ P.dc = dd; P.dcb = null; P.view = "dc"; state.view = "pruefseite"; took = true; } } catch(e){} }
      var mb = /#dcb=([^&]+)/.exec(hash);
      if (mb){ try { var list = dec(mb[1]);
        if (Array.isArray(list)){
          var items = list.filter(function(x){ return x && x.id; });
          if (items.length){ P.dcb = { items:items, idx:0, sent:{}, lastSent:null };
            P.dc = items[0]; P.view = "dc"; state.view = "pruefseite"; took = true; }
        } } catch(e){} }
      if (took) history.replaceState(null, "", location.pathname + location.search);
    })();
    portalRefresh();
    setInterval(function(){
      if (document.visibilityState === "visible" && (state.view === "bewerbungen" || P.view)) portalRefresh();
    }, 20000);
  }
  refresh();
  stInit();                       // studio live channel (no-op without __STUDIO__)
  lwPoll();                       // letter mailbox (no-op without worker config)
  setInterval(refresh, 300000);   // quiet 5-min refresh (data changes once per run)
})();
</script>
